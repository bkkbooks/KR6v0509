body:
  text: 四明陳寥士纂志圖記七塔報恩禪寺記浙江寧波市東五里許有七塔報恩禪寺者鄞縣志乘歷歷可考溯自唐大中十二年戊寅分寧令任景求君捨住宅為寺號東津禪院敦請心鏡奐禪師居之即本寺開山第一代也初禪師主持天童寺時徙神龍鎮毒蟒種種神通妙用詳載天童寺志茲不贅述咸通庚辰元年浙東剡寇裘甫掠奪四明縱兵晝入禪師晏坐禪定神色不動賊眾驚愕作禮而退辛巳二年郡紳奏請改名棲心寺以旌其德焉宋大中祥符元年歲次戊申賜額崇壽寺山門前河岸石橋尚存斯名至民國廿三年河填而橋始毀明洪武二年己酉延燬內法堂所燒隙地并開山祖塔後餘地改創養濟院現仍舊二十年丁卯因梅岺山寶陀寺即普陀山前寺懸於海邊徙建寺內餘地改名補陀寺殿前香爐鐫名尚存古蹟故寧俗尚有本寺即南海普陀之說大殿觀音為主每逢聖誕日進香覲禮不絕直至永樂年間僧寺俱廢後并原留東首空地三分之一復建棲心寺永樂二十二年甲辰建圓通寶殿宣德壬子七年建毘盧閣天順戊寅二年建藏經閣大悲殿彌勒殿及兩廊等屋滿清順治年間建方丈康熙間重修佛殿及鐘樓二十二年癸亥建大悲殿寺前有七浮圖俗人皆呼七塔寺者始於此其最不幸者咸豐辛酉十一年悉遭兵燬至同治辛未十年里人周文學君母子募貲重建大殿與山門寺中功德堂奉祀牌位以留紀念光緒十六年庚寅江東紳董耆老等公請本師慈運慧祖為主席時年六十有四自接住後開海單以安眾常住三百餘僧具大願力辛苦經營寺門前七塔古蹟中央改造天王殿大雄殿三聖殿中興祖堂新建法堂藏經樓及方丈後有開山祖塔樓上莊嚴寮東邊慈蔭堂樓上玉佛閣又有穀倉工作寮小厠所小廚房新庫房新新庫房老庫房老虎灶上官廳大客廳地藏殿大鐘樓念佛堂西邊雲水堂樓上華嚴閣又有浴堂行堂寮化身窰坭水工作房大廚房監齋殿五觀堂如意寮大厠所祖堂客堂禪堂禪堂西有餘地為僧塔僧坟等近今添設佛學院於藏經樓施醫藥所於三聖右廂其工程浩大閱三十餘年始竣事復於光緒二十一年乙未進京請頒龍藏并勅賜寺額名七塔報恩禪寺於丙申及丙午二年兩次傳授大戒民國二十三年又傳戒一次每年夏季請法師講經平日禪堂坐香隨時誦經禮懺念佛宣統二年庚戌本師慈老人西逝世壽八十有四住持事付囑法門克紹家業皈信輩擁護大法廣種福田叢林規模粗具堪壯仁人觀瞻而與育王天童並峙回憶我本師慈運慧祖俗姓朱氏適與始祖同宗自同治十三年甲戌住持天童又與開山始祖同出一轍及由鎮海李衙橋萬善寺住持而來主持斯寺推為中興第一代遞傳臨濟正宗心心相印四十八員法嗣悉皆分化諸方子孫綿綿大振宗風惟願後來賢哲報恩當記念天童法脈而弗忘也追溯本寺歷史由唐代大中十二年戊寅歲起經五代洎宋元明清四朝至民國廿五年歲次丙子止約計一千零七十九年矣時值國民政府通令調查僧寺古蹟為述其崖略如此佛歷二千九百六十三年國歷民國二十五年仲春住持溥常述於丈室七塔報恩禪寺平靣全圖民國念四年十月日四明胡惠章繪量備註坐落鄞縣甬東三四圖江東忠介街地方民國九年史悠德來計面積六分光緒二十四年張有慶來計面積七厘三民國九年史致容來計面積五分二厘六光緒二十五年張有慶來計面積二畝四分五厘八舊有基地計面積十六畝四分民國七年陳賢房張氏來計面積五厘六民國七年徐友根來計面積二畝二分八厘八總共計面積二十四畝三分九厘八民國七年徐友根來計面積公行地一分二厘二百丈小學借用操場計面積六分八厘九僧墳地計面積六分七厘七焚紙地面積二厘七民國七年王閏生來計面積四厘八民國七年王沈氏來計面積一分二厘一民國七年王沈氏與王閏生來計面積公行路一厘八又公有地共計面積一分四厘東首四塔基地計面積一分九厘四東首餘地計面積四厘六西首餘地計面積一厘八西首三塔基地計面積一分一厘七民國二年收回街樓屋三間計面積六厘比例尺六百分之一係英尺計算七浮圖山門及天王殿大雄寶殿正面鐘樓三聖殿藏經樓及法堂
