body:
  text: 四明陳寥士纂志金石一開山祖塔開山祖塔即唐心鏡奐禪師之塔也在方丈室中央上刻唐敕賜心鏡禪師真身舍利塔十二字其下碑文多漫漶不可讀惟立碑年月則為時咸通十四年歲次癸巳六月甲午朔草八日立猶可識也其餘斷碎文字見插圖中二補陀寺鐘題字鄞縣志卷六十頁十一云補陀寺鐘題字在七塔寺天順六年二月十九日造三補陀寺鐵磬鄞縣志卷六十頁二十二云補陀寺鐵磬在七塔寺泰昌元年仲冬四崇壽寺額鄞縣志卷六十頁二十八云崇壽寺額在鄞縣唐相裴休書輿地碑目五七塔鄞縣志卷六十六頁三十一云門外有七浮圖俗名七塔六五百羅漢湘刻五百羅漢嵌於大殿壁上碑文及名號如下五百羅漢像贊應真五百殊相堂堂少叢顯跡震旦流芳神通具足變化靡常圖模杖履筆審陰陽朗同星列次比雁行有瘦而削有頎而長有白而皙有老而蒼有示游戲有現端莊有麟其車有雲其裳種種會意作作生芒非空非有能隱能彰忽語忽默或存或亡諸漏已盡三昧誰詳度人出世說法開場天風浩浩海水茫茫龍降虎伏魚躍鳥翔去來現在聲味色香半絲不挂萬籟俱忘川含月印花茁蓮房成妙勝果具智慧囊八部拱手三千寶裝須彌是握芥子中藏遍灑甘露普設慈航門傳不二壽紀無量除彼煩惱任我徜徉億且可衍一亦何妨篆刻工巧神彩飛揚金身丈六放大毫光嘉慶戊午仲夏星沙劉權之撰并書二刻五百阿羅漢敍大覺世尊以悲願力敕諸阿羅漢應供人間不得入滅將使無邊衆生結無上勝緣出二死海而後已阿羅漢石碑嚮刻奉常州天寧寺遭髮逆燬盡湖南心月上人以舊拓本初刻於衡嶽祝聖寺復擬刻供江浙諸名剎無何以疾卒抄見大德以其志不可沒乃勉其徒惠安繼而刻之經始於光緒甲午秋越丙申夏而工竣噫其勷繼之功實有不可得而思議也與因托其緣起書而傳之南嶽默庵謹撰五百羅漢名號録第一阿若憍陳如尊者第二阿泥樓尊者第三有臤無垢尊者第四須跋陀羅尊者第五迦留陀夷尊者第六聞聲得果尊者第七栴檀藏王尊者第八施幢無垢尊者第九憍梵般提尊者第十因陀得惠尊者第十一迦那行那尊者第十二婆蘇槃豆尊者第十三法界四樂尊者第十四優樓頻螺尊者第十五佛陀密多尊者第十六那提迦葉尊者第十七那延羅目尊者第十八佛陀難提尊者第十九末田底迦尊者第二十難陀多化尊者第二十一優波鞠多尊者第二十二僧迦耶舍尊者第二十三教說常住尊者第二十四商那和修尊者第二十五達摩波羅尊者第二十六迦耶伽葉尊者第二十七定果德業尊者第二十八莊嚴無優尊者第二十九憶持因緣尊者第三十迦那提婆尊者第三十一破邪神通尊者第三十二堅持三字尊者第三十三阿㝹樓䭾尊者第三十四鳩摩羅多尊者第三十五毒龍皈依尊者第三十六同聲稽首尊者第三十七毗羅胝子尊者第三十八伐蘇密多尊者第三十九闍提首那尊者第四十僧法耶舍尊者第四十一悲密世間尊者第四十二獻華提記尊者第四十三眼光定力尊者第四十四伽耶舍那尊者第四十五莎底苾芻尊者第四十六波闍提婆尊者第四十七解空無垢尊者第四十八伏陀密多尊者第四十九富那夜舍尊者第五十伽耶天眼尊者第五十一不看世間尊者第五十二解空第一尊者第五十三羅度無盡尊者第五十四金剛破魔尊者第五十五願護世間尊者第五十六無憂禪定尊者第五十七無作慧善尊者第五十八拾劫慧善尊者第五十九旃檀德香尊者第六十金山覺意尊者第六十一無業宿盡尊者第六十二摩訶剎利尊者第六十三無量本行尊者第六十四一念解空尊者第六十五觀身無常尊者第六十六千劫悲願尊者第六十七瞿羅那含尊者第六十八解空定空尊者第六十九成就因緣尊者第七十堅通精進尊者第七十一薩陀波崙尊者第七十二乾陀訶利尊者第七十三解空自在尊者第七十四摩訶注那尊者第七十五見人飛騰尊者第七十六不空不有尊者第七十七周利槃持尊者第七十八瞿沙比丘尊者第七十九獅子比丘尊者第八十修行不著尊者第八十一畢陵伽蹉尊者第八十二摩利不動尊者第八十三三昧甘露尊者第八十四解空無舌尊者第八十五七佛難提尊者第八十六金剛精進尊者第八十七方便法藏尊者第八十八觀行月輪尊者第八十九阿那邠提尊者第九十拂塵三昧尊者第九十一摩訶俱絺尊者第九十二辟支轉智尊者第九十三山頂龍衆尊者第九十四羅網思惟尊者第九十五劫賓覆藏尊者第九十六神通億具尊者第九十七具壽俱提尊者第九十八法王菩提尊者第九十九法藏永劫尊者第一百善注尊者第一百一除憂尊者第一百二大忍尊者第一百三無憂自在尊者第一百四妙懼尊者第一百五嚴土尊者第一百六金髻尊者第一百七雷德尊者第一百八雷音尊者第一百九香象尊者第一百十馬頭尊者第一百十一明首尊者第一百十二金首尊者第一百十三敬首尊者第一百十四衆首尊者第一百十五辨德尊者第一百十六羼提尊者第一百十七悟達尊者第一百十八法燈尊者第一百十九離垢尊者第一百二十境界尊者第一百二十一馬勝尊者第一百二十二天王尊者第一百二十三無勝尊者第一百二十四自淨尊者第一百二十五不動尊者第一百二十六休息尊者第一百二十七調達尊者第一百二十八普光尊者第一百二十九智積尊者第一百三十寶幢尊者第一百三十一善慧尊者第一百三十二善眼尊者第一百三十三勇寶尊者第一百三十四寶見尊者第一百三十五慧積尊者第一百三十六慧持尊者第一百三十七寶勝尊者第一百三十八道仙尊者第一百三十九帝網尊者第一百四十明