亡靈日本橫濱中華會館同人敬獻七塔禪寺二十六字十寶鼎寶鼎在西方三聖殿前民國元年壬子冬鎮海信士阮世龍男文忠敬助住持岐昌率監院常西督造僧晉同募十一銅鐘銅鐘一在鐘樓上佛歷二千九百五十三年即民國十五年丙寅冬月住持覺圓監院溥常暨兩序同募上海南市董家渡浦東沈元吉冶坊鑄造七塔寺大鐘記昔罽呢吒國王貪虐無道造作深殃後受馬鳴大士教化以聞法力化重報輕歿後生大海中作千頭魚海中忽現劍輪時時回注截斷魚頭以業力故截已復生苦不勝忍唯聞某寺鐘聲輪即暫停苦亦少息王致夢白維那曰惟願大德垂憐矜憫擊揚延之過七日己罪報畢矣以是因緣西域諸寺扣鐘震響遍地咸聞我國肇於武帝問志公曰朕欲息地獄苦宜以何法答曰冥界惟聞鐘聲苦能暫息帝遂遍詔天下凡擊鐘者宜舒其聲可知先聖後聖其揆一也甬東七塔寺興而廢廢而興不知凡幾於前清光緒十六年慈運長老受諸紳請矢志重興從此鳩工庀材運斤伐木不十年寶殿巍峨光輝金碧兼之龍象濟濟輔弼得人頓與太白天童育王廣利並駕齊驅矣乃於二十一年北上奏請龍藏渥蒙頒賜奉旨回山復念興工動土纍及枯骸並憐遠近孤魂超升乏術爰是鑄造巨鐘揚聲息苦無如造經二次響未遠聞於是諸哲嗣流集衆建議易鐵為銅重新建造於民國十一年為始逐漸集資經五載竟稱告成洵知山河大地無一處非道場鱗甲羽毛非一物無佛性矧茲甬江為兩間之巨麗顧斯人道為萬物之最靈詎不頓現淨土而見大士法身者乎惟斯鐘也宏聲巨扣響震重泉將見夕梵晨鐘松風水月皆演無盡法音必能驚醒塵寰奚獨超拔冥界已也是為記佛歷二千九百五十三年夏天台宗晚學諦間謹記十二大銅鍋大銅鍋二口即大廚房之菜飯鍋民國十六年上海南市董家渡沈元吉敬助十三石香爐石香爐明季製上刻寶鼎二字十四普洽皓祖塔普洽皓祖塔在老天童寺東首民國二十五年冬重修十五慈運慧祖塔慈運慧祖塔在天童寺右玲瓏岩下十六普同塔普同塔民國二十年建在庾山嶺七塔寺普同塔記夫出家之法割愛辭親離塵捨俗參方訪道撥草瞻風僕僕塵寰為己躬之大事迢迢雲水顧隻影以前蹤從上諸祖建設叢林雖為十方衲子參學起見亦為老病死計庶使養生就醫各得其所安身立命自有其處而我七塔報恩禪寺自前清光緒間由地方紳耆公請先師慈運老和尚住持遂矢志中興十方道場不十年百廢俱舉規模完成雖有如意寮以為診病之區而養老堂普同塔尚付闕如圓瑛民國十八年接住報恩法席遂與監院德軒議及此事適有東鄉同嶴庾山庵莊嚴大師與余為道義之交聞悉此事欲以該庵獻與常住起造普同塔山水清明峯巒秀麗集議兩序均表同情由是監院德軒努力進行閲二寒暑而塔告成分三間中間安住持及諸山或班首職僧之靈骨左右大衆與客僧民十九圓瑛移主天童報恩一席以本舟和尚為當選迄今數載塔院亦成今者擬辦養老堂於院內塵氛寂靜竹木深幽晚年樂道實得其所誠一舉而兩得也因記緣起用勒諸石民國二十四年夏退居圓瑛宏悟撰記住持溥常立石附録慈運老人沉香木像江蘇省上海縣費門周氏法名善照年五十九歲初皈依慈老人為本師及民國十年來寺對余曰我師雖已去世我亦依師住處而去世購沉香木倩匠雕像虔誠焚香供奉不數月果得病西歸通信男兒興寶料理後事斯時也余任監院職而目覩之華嚴云信為道元功德母長養一切諸善根善照誠女中丈夫也三寶感化之力大矣哉特序事實述偈以贊之吾師德感動女性信專一佛說皈依僧同登菩提路民國二十四年冬月住持溥常謹識
