body:
  text: 四明陳寥士纂志産業産業表慈運老人接管以前之所有産業置産年産別坐落地方畝分畝附記失考宅地甬東三四兩圖忠介街一八三本寺田鄞縣打石弄三五田鄞縣橫石橋黃龍港六田鄞縣大河沿四共計地一八三田一三五慈運老人接管以後之添置産業置産年産別坐落地方畝分畝附記光緒三年田鄞縣新塘沿一一九五此田係光緒三十三年由岐昌法師助入田鄞縣周家埭何家門口九同上田鄞縣永南鄉誥嘉橋一二七同上光緒四年田同上四一同上光緒二年田鄞東余隘一光緒二二年田鄞東金價橋七五田鄞東大封橋三田鄞東三眼橋四田鄞縣二都四圖俞浪岸四田鄞縣二都六圖河圖草港三田鄞縣二都三圖楊家漕三以上大封橋至楊家漕共一契光緒二五年宅地甬東四圖張官房門內後園二八本寺光緒二六年田鄞縣三都七圖打網嶴四光緒二八年田甬東七圖楊家墊三七五田甬東七圖葉家漕五三七民國二四年建平房二九間占地一汽車路占地約八分以上楊家墊葉家漕共一契光緒二九年田鄞東舒江岸二二五田又長漕三田鄞東上洋一一二五田鄞東界牌四以上舒江岸至界牌共一契田鄞東福明橋四田鄞東史家壩四光緒三年田鄞東低田下三民國三年田鄞東泗港一二五田鄞東童家橫八田鄞東葛家漕二田鄞東泗港前漕五以上童家橫至泗港前漕共一契田鄞東四港二一田鄞東洞橋港八八田鄞東田野王三民國四年田鄞東漁郎岸嚴家漕二五田鄞東嶴湯何家漕八田鄞東大才九五田鄞東樟樹橋七五田鄞東馮家漕三田鄞東四澤橋一五田鄞東高隘樂家漕四以上嶴湯何家漕至高隘樂家漕共一契民國五年宅地甬東一圖下灰街一九民國六年田鄞縣二十都四圖長漕頭一三七民國七年宅地甬東一圖百丈街一宅地甬東四圖忠介街本寺東首一宅地甬東三圖筲箕漕一本寺宅地同上二本寺宅地甬東四圖忠介街本寺東首一民國九年宅地甬東四圖狀元坊屋後六本寺宅地甬東一圖新河頭一宅地甬東四圖狀元坊後三七三本寺民國一年宅地甬東一圖百丈街一民國一一年宅地甬東一圖新河頭教場弄口二民國一二年宅地甬東一圖小江橋下左首一八朝東田鄞東南張家堰六八五民國一四年宅地甬東一圖天后宮後街一民國一五年田鄞東南廟跟董七一四八田鄞東南南浦菴三田鄞東南應袁潘一田鄞東南畢家埭五七田鄞東南毛家漕六九三田鄞東南三橋一一一八田鄞東南大河沿二一八以上廟跟董至大河沿共一契民國一八年田鄞東寶幢鎮東嶴庾山一五六一本寺普同塔地同上二四三同上山同上一八同上民國二年宅地甬東一圖小江橋二朝西宅地甬東一圖下灰街教場弄口匯角二民國二二年田鄞東童家橫一二民國二四年河基甬東一圖百丈街二五宅地甬東大河路一田甬東大墩徐六田鄞東寶幢鎮橫嶴一九田鄞東殷隘五二五田鄞東妙勝橋六五田鄞東泗港口五九五田鄞東陶家漕一六田鄞東五都王二五田鄞東徐村二七五田鄞東漕河頭二五以上大墩徐至漕河頭共一契地甬東杏楊東巷一三地同上三田鄞東殷隘六民國二五年地甬東杏楊東巷二五四宅地甬東四圖忠介街本寺東首一田鄞東泗港一八三田鄞東田野王二四田鄞東童家橫七五以上泗港至童家橫共一契田鄞東泗港鵝脛匯五五田鄞東丁家弄童王六五田鄞東田野王八七以上鵝脛匯至田野王共一契田鄞東鵝脛匯泗港一九五田鄞東童家橫四以上鵝脛匯泗港至童家橫共一契田鄞東鵝脛匯六宅地甬東三圖筲箕漕九四六本寺民國二六年田鄞東石山弄五三五田鄞東鹿山頭三九田鄞東鍾家沙一五三田鄞東田洋村下車橋一三以上石山弄至下車橋共一契田鄞東五鄉碶一七四田鄞東邁齡一以上五鄉碶至邁齡共一契宅地鄞縣一都十圖二二六九共計地一九三九七內山一八田五八三四六管有外埠之産業置産年産別坐落地方畝分畝附記光緒二年宅地江蘇上海縣南市二四保方一二圖陳家港二八六五名紫竹菴又名七塔寺下院即現在半淞園之右首民國二年田本省奉化縣忠義鄉武舉洞彌陀菴二共計地二八六五田二三表統計地二一二八六六內山地一八田六一三八四六民國二十六年五月日
