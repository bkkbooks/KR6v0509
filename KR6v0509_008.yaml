明州心鏡禪師始飛錫來仍慈雲古剎東津寶蓋香煙大士南海蓮臺赤水灰飛丹山石老雲梵年年海宇開領乾淨棲心精舍不染塵埃崔巍七寶安排歷唐宋明清迹未衰喜千年數典時多聖迹一燈傳道代有人才臨濟正宗天童分派百八鐘聲甬水涯長僧衆往來雲水太白天台七塔寺志跋李佩秋鄞之七塔報恩寺與延慶天童阿育王稱四大叢林而開山於唐大中間心鏡大師詳載乾道四明圖經乃古道場也顧寺志闕如溥常上人誓發弘願請於陳君寥士為之秉筆成書八卷以授剞氏余讀其例言簡而有體嘗一滴水知大海味寥士其今之聞蕊泉乎蕊泉撰輯天童大慈延福壽昌海會保慶諸寺志傳本僅存為世稱重蓋其時丁易代身為遺民耽從方外之遊習作伽藍之記寥士所遭遇稍稍不同而浣心淨域染筆香林視蕊泉無遜色逸情雅尚倜乎遠矣余舊遊句甬未禮支提他日手此一編為隨喜之導文字斐亹引人入勝必不遙聞鐘聲攢眉遽去則又寥士之益我多也丁丑二月湖外李洣七塔寺志跋葛夷之吾友鎮海陳君寥士淵思雅才風神遒上少工詩詞及遊慈溪馮君木先生之門學乃益邃稱高第弟子宦遊歸來息影里居冥搜幽討日課一詩詩名滿天下一時畤士流人野老名宿皆折節與交詩簡往還無虛日君居密邇七塔寺為寧波一大叢林寺僧請君釐定寺志郵寄示余義例整贍考證賅洽足為志乘者之式不苐為叢林掌故增重而已敬跋數語以志服膺丙子歲不盡三日同學弟葛暘謹記七塔寺志補正丁丑重九日馬契西卷之二志金石棲心寺故禪大德藏奐和尚焚身五色色舍利三千粒時咸通十三年十一月四日進上七粒入內道場草九日唐敕賜諡號心鏡大師塔額壽相之塔勑奉為睿文英武明德至仁大聖廣孝皇帝延慶節建造此塔伏資景福時延通十四年歲次癸巳六月甲午朔草八日立知造石塔僧惠中知造舍利殿僧丁丑重九日豫至七塔寺住持指南和尚賜寺志一册閲至開山祖塔塔文覩影印真迹與謄録之文頗多不符知必有脫文誤字者在因拈香禮祖侍者執蠟炬照讀重將石刻文字抄下塔文正面計十一行凡一百一十七字每行字數雖多寡不同然文義具足字迹分明可識惟末後一行僧字下被石質殘損已失名矣豫閲竟和尚及諸僧同來審閲所見僉同謹照原文行數録書如上其背刻梵語實為佛頂尊勝陀羅尼咒其石塔因格於龕門不便檢視覽其所録雖非全文亦可知也此咒出佛頂尊勝陀羅尼經乃世尊告帝釋消滅業障增益壽命之法亦得書寫此陀羅尼安高幢上或安高山或安樓上乃至安置窣堵波中云今將此咒全文録后藉存參考佛頂尊勝陀羅尼咒那謨薄伽跋帝一啼隸路迦鉢囉底毗失瑟吒㖿勃陀耶二薄伽跋底三怛姪他四唵五毗輸馱耶娑摩三漫多皤婆娑六娑破囉拏揭底伽訶那七娑婆皤輸秫地阿鼻詵者蘇揭多伐折那八阿𪢗㗚多毗曬雞九阿訶囉阿訶羅十阿瑜散陀羅尼十一輸馱耶輸馱耶十二伽伽那毗秫提十三烏瑟尼沙毗逝耶秫提十四娑訶娑囉喝囉濕弭珊珠地帝十五薩婆怛他揭多地瑟吒那頞地薩恥帝慕𭉐隸十六跋折囉迦耶僧訶多那秫提十七薩婆伐羅拏毗秫提十八鉢羅底你伐怛耶阿瑜秫提十九薩末那阿地薩恥帝二十末禰末禰草一怛闥多部多俱胝鉢唎秫提草二毗薩普吒勃地秫提草三社耶社耶草四毗社耶毗社耶草五薩末囉薩末囉勃陀頞地薩恥多秫提草六跋折梨跋折囉揭鞞草七跋折濫婆伐都草八麼麼薩婆薩埵瀉迦耶毗秫提草九薩婆揭底鉢唎秫提三十薩婆怛他揭多三摩濕婆娑遏地瑟恥帝卅一勃陀勃陀蒲馱耶蒲馱耶三漫多鉢唎秫提卅二薩婆怛他揭多地薩吒那頞地薩恥帝卅三娑婆訶卅四卷之四志建置甲過去之一斑圓通寶殿明永樂十二年建圓通寶殿浙江統志卷二百三十引成化四明郡志志作二十二年相差十年藏經寶閣等天順三年建藏經閣大悲殿及廊廡同上志作二年未知孰是乙中興後之概況開山祖塔大清光緒丙午住持慈雲重修按祖塔石碑正中刻唐敕賜心鏡禪師真身舍利塔十二字外其上款尚有大清光緒丙午下款住持慈雲重修兩行文字照相既未攝入志中亦未載明録之以見慈公報本敬祖之意卷之五志僧譜唐明州棲心寺藏奐傳釋藏奐俗姓朱氏蘇州華亭人也母方娠及誕常聞異香為兒時嘗墮井有神人接持而出丱歲出家禮道曠禪師及弱冠詣嵩嶽受具母每思念涕泣因一目不視逮其歸省即日而明母喪哀毀廬墓間頗有徵祥孝感如是由此顯名尋遊方訪道復詣五泄山遇靈默大師一言辨析旨趣符合顯晦之道日月之所然也會昌大中衰而復盛唯奐居之熒不能惑焚不能熱溺不能濡者也洎周洛再構長壽寺敕度居焉時內典焚毀梵夾煨燼手緝散落實為大藏尋南海楊公收典姑蘇請奐歸於故林以建精舍大中十二年鄞水檀越任景求捨宅為院迎奐居之剡寇裘甫率徒二千執兵晝入奐瞑目宴坐色且無撓盜衆皆悸懾叩頭謝過寇平州奏請改額為棲心寺以旌奐之德焉凡一動止禪者必集環堂擁榻堵立雲會奐學識泉涌指鑒岐分詰難排疑之衆攻堅索隱之士皆立褰苦霧坐泮堅冰一言入神永破沈惑以咸通七年秋八月三日現疾告終享年七十七僧臘五十七預命香水剃髮謂弟子曰吾七日在矣及期而滅門人號慕乃權窆天童巖已周三載一日異香凝空遠近郁烈弟子相謂曰昔師囑纍令三載後當焚我身今異香若此乃發塔視之儼若平生以其年八月三日依西域法焚之獲舍利數千粒其色紅翠十三年弟子戒休賚舍利述行狀詣闕請諡奉敕裒誄易名曰心鑑塔曰壽相奐在洛下長壽寺謂衆曰昔四明天童山僧曇粹是吾前生也有墳塔存焉相去遼遠人有疑者及追驗事實皆如其言初任生將迎奐人或難之對曰治宅之始有異僧令大其門二十年之後當有聖者居之比奐至止果二十年矣又奐將離姑蘇為徒衆留擁乃以棕拂與之曰吾在此矣汝何疑焉暨乎潛行衆方諭其深旨又令寺之西北隅可為五百墩以鎮之或曰力何可致奐曰不然作一墩植五株柏可也凡微言奧旨皆此類也刺史崔琪撰塔碑金華縣尉邵朗題額焉宋高僧傳三集卷十二按浙江統志卷二九九天童寺志卷三傳文並引此惟天童志中添其遺迹則徙清關之神龍於太白峯頂鎮毒蟒於小白嶺上一段因緣云大師為七塔開山之祖天童秉法之宗其大光明藏照徹今古今志中於僧譜內略此傳文圖記金石語焉不詳使大師得法行化種種神通妙用湮沒無聞未免數典忘祖之失後之修志者宜將此傳冠於僧譜之首則得矣明智中立法師傳法師中立鄞之陳氏賜號明智母夢日輪入懷遂有娠夜不三浴則啼號不止九歲出家於甬東之棲心受經一誦永憶不忘治平中試經開封府中選得度初依廣智學教觀及神智繼主南湖復依之熙寧中神智開幃設問答者二百人無出師右乃舉居座元久之去謁扶宗於永嘉將歸宗曰子行必紹法智之席及神智謝事乃俾師為繼元祐初高麗僧統義天遠來問道甫濟岸遇師升堂歎曰果有人焉遂以師禮見傾所學折其鋒竟不可得師令門徒介然始作十六觀室以延淨業之士已而辭去曰吾年六十當再來即退處東湖之隱學數年郡太守王公勉主寶雲一新棟宇於伽藍神腹得願文云後百年當有肉身菩薩重興此地聞者異之後退隱白雲庵日宣止觀至不思議境歎曰吾道至此極矣文慧正師亡郡請再主延慶果符六十再來之言歲懺行江浙延慶為最盛擇其徒修法華懺者七年行法將圓禪觀中見一大舟衆欲乘不可唯師坐其中以行政和五年四月辛亥謂門人法維曰吾聞異香心甚適悅謂觀堂行人曰吾當與汝輩長別即面西坐逝塔於崇法祖塔之東陳瑩中嘗讚師曰嚴奉木叉堅持靜慮以身為舌説百億事佛祖統紀卷十四節録按師出世説法雖在延慶寶雲兩剎於棲心並無建樹然既為出家之地録之亦可見其來有自師於延慶為第四代住持聲光所播遠及異域又令其徒介然闢十六觀堂成今日觀宗弘法之盛師誠大善知識也哉淨土聖賢録三並引此文卷之八志藝文唐明州棲心寺藏奐和尚舍利塔碑刺史崔琪撰碑文亡按此碑所述必有大可記處待考勘誤表正誤卷頁行字黼黻四五十二三四裁載四十十二六隱靈五九七十七𧘅衙五十一二七聖座五十四十二六固國五十六六草七五草一六十一郴柳五草五十九湖淺五草六草一十三後復五草七三八發心結緣者心發心結緣五卅六十三草一虛靈六二十一禰稱六四八草二上六四十二二黼黻八九十五楖榔八十二七八擔簷八十二七十一
