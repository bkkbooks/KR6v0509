body:
  text: 四明陳寥士纂志藝文重陽後一日偕水月上人登慈溪驃騎山敬安寄禪重陽後一日結伴此登臨萬壑白雲滿千山紅葉深寒潮明遠浦疏磬散空林憑眺斜陽裏茫茫愁古今懷明州皈依長老太白峯前聽法回寒梅二十度花開何時七塔橋邊寺重禮明州布袋來寄水月法師憶昔天台訪赤城與師芒屨踏雲行何堪一返衡山錫草木蒼黃十二更以上三首見八指頭陀詩集丁丑春太白慈運長老退歸鎮海萬善寺因贈芒鞋竹杖歸來日山色泉聲悵別時但願人天更推出長庚依舊侍吾師戊寅春日懷慈運長老春風吹雨日凄凄風雨懷師欲寄題遙憶青青江岸上用白句幽齋新築與雲齊時師重修萬善寺代皈依和尚挽陳建科先生三首陳摶本是地行仙小謫人間七十年忽聽秋風動歸思騎龍飛上太華巔苔芩誼重最難忘倚著斜陽欲斷腸曾記黃梅細雨節為余親到白雲鄉尚有行蹤在緑苔一回相見一回哀茅堂晝靜松風起猶似先生杖履來以上五首見嚼梅吟藳寄水月法師一別明州歲屢更湘雲海月若為情思君直到無聊處醯利摩訶唱幾聲此為八指頭陀集外稿感懷岐昌水月六十年前一息孩今辰初次出娘胎嗷嗷待哺餘無曉噯噯如言孰可猜轉眼光陰人面老回頭世事我心灰彌陀若現西方境下品下生亦善哉吾人惟壽小陽天花甲云周月正圓漫道李君還在腹若論顏回尚壽延彭殤由命更何説順逆自召莫問禪為報高明須著意蓮池多種池中蓮娑婆堪忍苦衆生誰把將身比老彭得意能經幾歲月却情不隔一毛莖眼前未悟刀頭蜜事後始知暗裏兵從此是非請莫辨彌陀句句作章程當初一念失圓明衆苦因緣若作城順耳惟聞半句好纍身多被三分情人尊人辱何須論我是我非仔細評了覺浮生如幻夢毋勞濟濟祝長庚生日書感岐昌水月高賢為我慶長庚誰識長庚此日生還望吾翁臻福壽法門永永作干城靜意焚香拜地藏為先考妣託生方少時課讀功堪竣行超尊前晉玉觴多生輪迹苦娑婆何必區區廢蓼莪能把此身歸淨土蓮胎九品壽彌陀原夫生滅本虛空法性真如體自同怎奈幻人多説幻夢中猶唱大江東和岐昌大和尚感懷向錦峯秋風蕭颯為誰來驚覺鄉思夢一回最愛虛心如淡竹調和聖水作鹽梅慈悲有願惟明性忠恕無違亦化災今得清癯除癖法自慚乏報益徘徊題自繪達摩祖師像蓮生湛然西來誰信渡江難波浪蕭蕭一葦寒面壁十年緣底事這回丟掉破蒲團題自繪觀音像蓮生湛然妙圓通體超諸礙量等虛空含法界盡十方空一普門塵塵大悲觀自在恭步水月法兄原韻圓瑛隻鉢孤身西復東祇圖及第悟心空未知那日能如願翻悔平時少用功多藉熏陶沾化雨常承照拂感春風欲詢歲月蹉跎事卅度青山緑樹叢謝水月法師惠狼毫無名氏縱橫筆陳向稱雄曾掃千軍立大功多少披堅執鋭士未傳不律不能通懷才抱異雖堪誇恃在中書會一家莫笑毛錐無用處古人尚有夢生花養得才高道亦高文情吐馥在揮毫此時若遇知音賞能使將軍解佩刀謝水月法師惠茶次原韻無名氏偶傍深山買樹栽栽成香味勝於梅欲知何處名茶採但見雲迷百尺臺多情惠我莫能酬洗盞深嘗憶蜀州道是麥顆為上品詩人趁此話風流恭祝岐昌老人八十冥壽七絶四首洛陽白馬寺德浩古剎謫居數十秋為傳衣鉢且勾留年來只恐塵氛染佛國急歸不掉頭屈指歸真已十年水光月色兩悠然一篇貝葉千聲佛留與名山弟子傳人世滄桑幾度更依稀江左梵鐘聲茫茫苦海橫流急願化慈航度衆生愧我輪回墮劫灰神州莽莽等間來平生未遂從遊願聊向圓靈獻壽杯祝岐昌老和尚八秩冥壽北京法源寺梵月四明鍾秀挺生岐昌靈根夙具穎悟異常從聞思修動靜安庠聲音和雅梵韻鏗鏘醒人迷夢水月道場慈運高足剎海津梁慷慨輸金七塔發光提倡教育建立經房救濟貧困視民如傷宏宣佛化整頓僧綱法音遠播萬古流芳十方欽敬四衆稱揚八秩冥壽一瓣心香瞻彼道景佛壽無量追懷岐昌法師陳寥士法師參玄奧了了明真義出家永豐菴拄錫報恩寺吾齋近咫尺麈座常隨侍冀晉川皖湘雲遊無不至涉江復渡河五嶽橫胸次蘇浙佳山水更與通寤寐光氣被四表出言有清致淵淵魏晉文朗朗蘇趙字所篤在道行凡此皆餘事圓寂忽十年遺物惟經笥我苦攖世網精靈倘啓示送溥常和尚住持七塔寺陳寥士古剎往經過高僧舊識多三江流㳌泄七塔影嵯峨衣鉢傳薪火聲聞出薛蘿檀煙浮寶座説法未蹉跎贈溥常法師陳寥士阿師本湘人湘水琉璃碧攜筇上衡山孤雲曳雙屐靜觀水簾洞去住了無迹聞昔初發願春秋二十七一聲阿彌陀劫消八十億金陵去毗盧滇藏賴籌劃窅𥥆𪻤琅嶼衣上波痕白弘法來四明駐錫到七塔華嚴極微妙寶如連城璧九會説四分奧窔盡宣斁善我參法喜招我飯香積大年登古稀講座笑談劇形獅行可師諦公贊不易諦間上人曾作溥常法師玉照贊云其形如獅其行可師法門比龍象白毫光四射峨峨吉祥光玄相慰虛寂與寥士采泉同遊七塔寺訪溥常老人率贈永嘉趙柏廎百辛塵塵剎剎現圓通不見魚龍護梵宮虛費草鞋錢可惜海南了不異江東寺舊名補陀虔禮觀世音亦如南海諸剎性海心光處處融宗風能暢辨能雄千門萬戶從渠指都在重重帝網中師通華嚴常以十玄六相課門徒博辨宏通在南北法筵中當為希有事也水有源頭蓮有根砂盆無底養兒孫分來滴滴曹溪乳始信僧家解報恩師方創宗譜寺內設報恩佛學院即師所主持滄海橫流辨道難棲心何處覓心安寺舊名棲心勞師拈出金剛眼重向毫端豎剎竿時有創修寺志之議南朝多少名藍盡塔影頺然恐未知劫罅光陰原彈指一千年後我題詩唐大中十二年分寧令任景求始捨宅為寺至是千七十年矣和作陳寥士綿密人天消息通誰能捨宅矗禪宮佛光照徹三千界讚歎何須吾道東偶攜二客證圓融參到華嚴大乘雄一寸心波光奕奕真如便出客塵中七塔峨峨石作根傳燈都是佛兒孫綿延一脈源流遠中興從渠説報恩傳記荒疏考證難鉤沈搜逸意初安一編草創叢林志邁進當如百尺竿壁間五百阿羅漢刻自沅湘寶可知文字馨香緣法在摩挲唐碣共題詩和作溥常法法圓融無不通真風扇動飯王宮趙州草履錢虛費君今應迹趙氏或者古佛再來讖記大乘讓震東華嚴法界盡圓融參透觀音道更雄明朝普陀觀音移此名補陀寺深入一門能徹底塵塵剎剎在其中學佛原來重信根門庭設施見兒孫大王肴膳充禪悅檀護皈依報四恩大海浮漚休話難身心看破定知安天龍一指深深意重進直超百尺竿伽藍興替莫奔馳業感衆生亦自知文字因緣時節至請君才筆賦新詩本寺志乘正在集議起草和作鄞周湜采泉四望清流與海通黃金為闕玉為宮當年縱被紅羊劫塔影依然夕照東手注華嚴一貫融精神矍鑠道方隆此生悟到前身事舍利應留石鼓中寺中有唐代石塔一形如石鼓旁列款識云是補陀寺前身師既重新佛殿築龕奉塔參拜甚勤舍利事詳心鏡禪師傳枝枝葉葉護靈根輸與幽禽長子孫共託佛門沾雨露誰言花木未知恩自笑藝藝覺世難心無罣礙尚清安何當脫去三千劫妙諦潛參百尺竿永嘉居士明州客待詔風流舉世知佳句爭傳齊唱和紗籠應護紀遊詩胸中超豁參寥子頰上蒼髯蘇長公莫怪老來忘歲月壁間禪杖已如龍意有未盡附呈一首和作永嘉鄭伯烺碧琅行樹明霞處處通樓臺七寶梵王宮悠悠千載莊嚴地依舊崔巍浙水東一顆心光萬炬融妙蓮舌壓百夫雄翛然省識闍黎面宛在毗盧莊海中師能華嚴玄旨其詮釋精到處一時奉為圭臬漫計仲尼真弟子達摩畢竟有兒孫昔饒德操祝髮後贈人詩有要做仲尼真弟子須參達摩的兒孫句報恩七塔分明在我愧平生未報恩我道支持事卻難更誰盜次覓心安寺之初祖心鏡奐禪師當剡寇肆掠祖安坐入定不為動盜因驚悸而退嗣寺更名為棲心相看一點傳薪火又仗阿難豎剎竿師近方纂修寺志前世德雲今我是為言來去渺難知山僧定罷還長嘯笑指東坡壁上詩百辛夙耽禪悅而牢愁綺思又往往託諸吟咏膾炙人口不啻今之東坡和作淡雲聖境無門道可通行來處處琉璃宮樓臺百八鐘聲裏七佛道場彼岸東一念精明萬法融惺惺寂寂觀心雄三千妙境宛然具生佛同居空假中色身虛幻死生根無量劫來作子孫骨肉皮毛遍世界教人何處報親恩下手工夫誠所難時長月久易心安西風掃盡秋雲影慧日高懸百尺竿心燈到處任人續祖意從來非我知秋水長天明月夜不勝千遍讀君詩余與溥常長老邀同胡蒙子朱別宥楊端虛童次布趙百辛王玄冰王式墉袁孟純周岐隱周采泉宋少芬謝岐山楊蟬潛集七塔寺即席分韻得明字陳寥士前宵已失中秋月古剎還同佛火明遁世高蹤問瓶鉢漫天涼意透簾旌早供隔海觀音像試叩開山祖塔名文字他年留掌故曹溪分乳拓源閎集七塔寺分韻得侵字鎮海宋少芬梵宮花木閟秋陰入室同聆微妙音法界能空人我相詞流合獻短長吟擬修寺志生宏願崇闡華嚴見苦心一醉上方歡喜甚歸程何慮夜涼侵集七塔寺分韻得機字象山謝鳳鳴岐山風塵回首欲忘機偶到禪房叩竹扉悟徹水雲無去住看來獅象有神威聽經尚恐天花著揮麈常聞玉屑飛此是東南吉祥地零文墜獻得朝暉集七塔寺分韻得尤字奉化孫詒兆梅已過中秋徒月朗自孤佳約欲誰尤是夕余因事未到因緣已許追蓮社文字相期託緇流千載東津風未歇一航南海迹仍留亂離何處棲心著還問稀年老比丘集七塔寺分韻得青字鄞周湜采泉亭亭塔影長無恙穆穆叢林想舊型再世中興初發願七旬弘法自延齡舉頭明月瓊樓冷獨立蒼茫宇宙青翰墨姻緣千古事文星常護老人星集七塔寺分韻得中字鄞周利川岐隱幾日秋風秋雨中蕭條詩意寄疏桐忽逢勝會招多士更喜清徽接遠公滿座靈龕藏舍利玉毫金粟擁禪宮東津覺岸猶堪識七塔斜陽立古紅集七塔寺分韻得灰字鄞楊貽誠菊庭須彌彈指見樓臺一偈能呼石壁開十二因緣真亦幻三千世界坐成灰心空八垢山同壽花雨諸天春自來選佛場中添鶴算東津七塔共崔嵬春信先傳嶺上梅戒燈續焰不生灰高山仰止乘風注流水清潺破浪來覺路金繩開彼岸迷川寶筏渡蓬萊慈悲即是長生術何必銅盆露一杯集七塔寺分韻得筵字奉化楊受乾九一子胡意今宵也列筵拈來韻字我居先無心茹素難成佛有酒放狂且學仙變化無窮身五百陰陽不測界三千相隨一劍凌空去沖向句東萬里煙人到知幾始學禪坡翁心事我知先金山玉帶遺元老丹井銀砂亦散仙梅月初升標塔影樓臺直上與雲連簷前鳥雀常相聚為聽真言繞法筵集七塔寺分韻得蕭字蕭山朱鼎煦別宥天風吹葉影蕭蕭道侶招邀破寂寥薏苡當珠記遺事琉璃勝月共秋宵依然金碧補陀寺莫念滄桑崇壽橋鴻雪偶同香積飯清言便覺俗塵超集七塔寺分韻得元字鄞王玄冰道場花雨散繽紛歷劫如何報佛恩杯渡錫飛知有自海南一脈溯根源塔影玲瓏涌寺門眼前突兀現昆崙開山古迹分明在始信靈光魯殿尊遠公入座留高躅文暢能文豁智門緇素品流原一氣因緣如是夢堪溫丈室留賓茗碗溫筍蔬餘味齒齦存南衡法席蓮花社定作華嚴會上論集七塔寺分韻得魚字溥常且看中秋月影虛文人邀請暫停車素筵暢敘逃禪者冷句高吟本性如唐代神僧留古剎甬東名士續新書報恩修志時當至靜聽雲間響木魚集七塔寺分韻得燈字趙柏廎眼明初見唐朝寺欲下南詢拜未能寺為初唐古剎舊名補陀主僧溥常長老精