body:
  text: 四明陳寥士纂志建置甲過去之一斑養濟院明洪武二年延燬內法堂址并塔後地餘址改創養濟院鄞縣志卷六十八頁十三今存圓通寶殿永樂二十二年建圓通寶殿毗盧閣宣德七年建毗盧閣藏經寶閣等天順二年建藏經寶閣大悲彌陀殿及廊廡等屋以上鄞縣志卷六十八引成化志十王殿嘉靖間建十王殿鄞縣志卷六十引嘉靖志方丈清順治間建方丈佛殿等康熙間重修佛殿山門及鐘樓以上鄞縣志卷六十六引朱志咸豐十一年兵燬同治十年里人周文學母子募資重建佛殿山門同上採訪大悲殿二十一年康熙建大悲殿門外有七浮圖俗呼七塔寺鄞縣志卷六十六引聞志乙中興後之概况天王殿清光緒十六年庚寅慈運長老徇地方之意任住持之職慘澹經營多所興建修理天王殿客堂祖堂齋堂庫房禪堂雲水堂等民國六年住持僧晙和尚改建天王殿五間中三供彌勒菩薩左右各一供四天王後與大殿相對者供韋馱菩薩殿高二重底層較廣報恩禪寺天王殿皆大歡喜韋馱殿乙未歲長至月鎮海陳修榆敬書三州感應乙未長至月鎮悔陳修榆敬書威鎮天魔東津舊院南海真宗以上皆匾額一生補處寄諸天普現菩薩身當年鹿野苑中曾助迦文傳密意三界輪迴仍故我誓修唯識定他日龍華會上願隨無著覲慈顏乙卯中秋慈運私淑弟子吳嘉瑞敬撰並書信士陳裘賡率男亦銓亦山孫本初本崇本祥敬獻此四尊都是武裝勇力百倍今朝同護法門猶見餘風颯爽得一佛立成善果皈依三寶昔日頓開覺路全憑行雨宏深民國九年歲次庚申十月穀旦里人謝行溎撰蔡和鏘謹書護法信士柳哲衲率男中炤孫和堯敬獻助如來說般若波羅密汝當奉持經典所在則為是塔眾生發無上菩提心明終不盡善法增益乃報佛恩民國八年九月夏同龢薰沐敬書信士余葆三率男學樑學楨學棟學楣學柟敬獻萬劫現金身南海祥光瞻滿月七重留寶塔東郊勝蹟拓棲霞光緒廿三年春王月吉旦弟子董茂容率男仁卿敬獻大雄寶殿原名圓通寶殿光緒十七年辛卯慈運長老重修改為今名廣五間中奉千手觀音菩薩左文殊右普賢殿後又有觀音像而五百羅漢石刻分嵌于左右及後壁上殿為兩重躐角式周圍均係方石柱上鐫各種聯語大雄寶殿光緒十九年六月穀旦里人李瑞彰敬立命子仲光沐手謹書慈流海澨同治十三年歲在閼逢閹茂南呂月中澣穀旦賞穿黃馬褂花翎強勇達春巴圖魯提督浙江全省水陸軍務節制各鎮加一級黃少春敬立慧海慈雲同治四年歲在乙丑無射月全澣吉旦邑人陳勵敬書弟子張朝宗率男道業道榆道榮道枋道林孫克廣克鎮克賢克昌克配敬獻澤沛閩嶠光緒元年歲次乙亥孟秋月上澣穀旦里人陳懋采敬書廈門幫通泉號元昌號啟興號同敬獻覺路潛通同治十二年癸酉歲黃鐘月穀旦里人孫學庭謹書寧幫眾米商公立濟世慈航同治十三年歲次甲戌七月穀旦陳愈涌敬書甬上北號眾商敬獻慈恩似海光緒丙子歲林鎰月甬江木號眾商敬獻至誠可感光緒廿一年乙未二月穀旦部下弟子陳祖浩率男烈鈁烈銘烈欽孫愈桐愈梓敬立慈航從南海蜚來劫歷千年猶認補陀真面目舊院合東津建復門留七塔何須阿育幻浮圖光緒五年歲在乙卯春正月會稽王繼香撰里人陳允升書里人吳煊率男顯鋆顯厘顯珪孫家樑家楨家楣敬立建剎與闤闠為鄰緣菩薩本超凡煩惱皆除也可到此間立脚飛錫來普陀絕頂憫眾生而救苦沈迷果覺庶幾從彼岸回頭同治十二年昭陽作噩之歲良月吉旦邑人張慶璜題泉州深滬幫謙泰號商敬立南海傳燈壬申仲秋立元和顧文彬慈航普濟己未冬月常住重修眾姓女敬獻夏汝霖敬書靈應昭垂光緒仲冬月穀旦補用同知候補知縣錢鍾麟敬立佛從海上飛來息足小普陀無量無邊誓願眾生超苦海僧是山中習靜棲心大自在即喧即寂始知塵市有深山同治十一年孟秋之月重修七塔寺告成謹撰楹聯題於柱石布政使銜甯紹台海防兵備道顧文彬敬書南海渡慈航甘露普霑千世界東津開梵剎法雲長蔭七浮圖同治十一年九月中浣里人童華薰沐謹書海南久駐慈雲大菩薩照恩光早共仰千手千眼甬東聿新佛地小普陀傳聖蹟不須著一色一塵鐵峯張恕敬書勝地接虹橋古剎重新七寶莊嚴觀自在法輪轉鹿苑元門入妙不通朗徹見如來同治十二年歲次癸酉嘉平月穀旦里人趙佑宸敬撰廖祖憲敬書浩劫閱紅羊七寶裝成金粟界真如參白馬三明悟到鐵蓮洋同治十有一年九秋之吉谿上張廣延書古剎閱三修問我佛西來度苦厄經幾魔劫浮圖輝七寶看大江東去放光明照徹迷津同治十三年長至月甬上凌忠鎮撰句并篆萬劫現金身南海祥光瞻滿月七重留寶塔東郊勝蹟拓棲霞同治十年辛未歲八月全浣里人章鋆敬撰并書紫竹蔚叢林現大士身而說法赤堇修古剎宏眾人願以成材同治十年十月上浣里人周岱敬撰并書三昧悟真修化宇咸遊何處非西方世界四明留古剎慈航普渡此間是南海津梁同治甲戌仲夏穀旦張家驤敬題地脈接鄮山梵宇巍峨震旦雲霞圍舍利道心悟清夜禪關寂靜乾鐘陀鼓應祇園同治甲戌小春月榖旦陸廷黻敬書小補陀福地重開浩劫化成金粟界大菩薩慈航普渡眾生穩涉鐵蓮洋同治十有三年歲次甲戌杪冬之吉弟子周晉麒敬獻選佛重開場仗大慈悲立小普陀無量威神觀自在破慳同結願師善知識種諸福德不可思議契真如同治十有三年歲次甲戌六月之吉長沙彭慰高撰句敬書七塔寺重修大雄寶殿暨裝金千手觀音文殊普賢及滿堂聖像募緣啟溯唐大中間心鏡奐禪師杯渡西江錫飛東甬任公舍宅建寺居之顏曰東津後易棲心旌其德也歷宋元明代有興替至清光緒中葉慈運慧祖崛起中興琳宮紺宇爛焉一新門廊殿廡燦然大觀賜額報恩又名七塔以門外有七浮圖也迄今選佛場開宗風益盛南參北詢之流至者如歸禪誦梵典之聲不絕於耳鴻儒白丁無不知有七塔之勝者據考明洪武間因梅岺山寶陀寺懸海徙建於甬東棲心寺內空址恭迎大士瑞相亦供於此改為補陀寺自時厥後寺之正殿永奉觀音大士靈感顯著屢有異徵所以一方人士爭為植福培因之道場各地信侶亦為經此必朝之靈蹟洵甬江之名藍震旦之祇園也雖然既有先人以拓其基必藉繼世以傳其後或證明心性紹往開來或恢宏願力興廢舉墜庶幾山門永振法矩常暉若僅粗衣糲食離羣索居完山僧野衲之本分安能使住持三寶永作金剛不壞耶迺者敝寺大雄寶殿暨內供千手觀音及諸佛聖像建造日久漸呈暮象不惟有損觀瞻抑且殊失相好指南職掌住持責有興廢誓發宏願莊嚴依正唯是一木難支大廈眾志方可成城普望給孤長者韋提夫人或匿王之再世或阿育之重來共秉崇佛之心同興護法之力將慈悲寶筏為子孫廣植福田以喜捨願船度祖宗超生蓮界種如是因結如是果經有明言决信無疑謹啟住持指南率監院明校敬募三聖殿位於大殿之後廣七間中供西方三聖立像高二丈八尺有奇光緒十七年辛卯慈運長老重建莊嚴之相甲於諸方光緒二十年甲午與大殿千手觀音像同開靈光民國二十五年丙子發起三聖裝金附記西方殿內所供三聖立像高二丈有八裝金工事非集鉅資難底於成用是擬募萬佛良緣以一佛為一緣每緣捐認國幣一元如一人樂認多緣或多人合認一緣者一聽隨喜但每緣請念彌陀聖號千聲以資回向菩提如上募之緣除裝三聖金像外復有餘欵一部作為啟建萬佛水陸道場之用專為信施檀那祈福薦亡及超拔民國以來所有中外南北陣亡將士之靈並祈禱世界和平人民安樂一部作為擴充如意寮之費普結十方僧眾病苦之緣因附記於此三聖殿壬子冬月景辰長沙蕭榮爵書果證菩提光緒二十九年一陽月吉立邑人周振翰敬書張門顧氏善蓮敬獻圓通妙諦光緒丁酉歲嘉平月吉旦里人王振鈺謹書甬三境弟子屠益哉王明遠張維新敬獻香光莊嚴民國廿五年十月重修殿宇三聖裝金開光溥常述句東光陳寶麟書張崇黼敬獻由來號崇壽歷劫重新喜佛光普照十方長為熙朝資聖壽何處覓棲心隨緣且住願僧眾靜參三昧直從覺路證禪心光緒辛卯仲春月穀旦里人陳烈鏞謹撰並書自懸海有寶陀寺名普渡慈航作津逮仿靈山為諸大眾說宏開梵宇廣燈傳里人林鼎梅撰并書號為小普陀依舊慈燈輝寶塔奉有大菩薩重新法苑現珠林里人張世訓撰并書鄮山本維衞生鄉負郭訪叢林聽百杵鐘聲似否西遊海會明代為寶陀故址頻年餘劫火攬七重塔勢依然南拱天封里人徐隆圻謹撰并書十方來十方去十方共成十方事萬人施萬人捨萬人同結萬人緣光緒甲午年孟秋穀旦弟子李庭芳率男名煊名炯孫廣善廣書敬立釋迦對韋提夫人說十六妙觀專觀極樂慈父見身實相出苦海彌陀為法藏乞士發四八誓願惟願娑婆眾生念佛洪名坐金蓮民國二十四年仲冬月皈依童男圓吉徐孟楣隨喜住持溥常撰句金峨七十老樵卓梵敬書南海真宗四明佛地歷千餘年滄桑變易自得慈老中興竟與天童育王同稱鼎足民國廿五年秋月信女朱門馮氏式慧敬助東津古蹟七塔道場建三聖殿棟宇莊嚴儼然彌陀示現仍並觀音勢至共作慈航方丈屬瀾撰書西方三聖裝金萬緣啟我佛於過去無量劫中以巨大犧牲之精神修種種之福德智慧及至最後豁然大悟親證本有之真如妙性復以其所覺之道不辭辛瘁以覺悟眾生俾一切眾生皆得證其所證之妙性以共享其不生不滅之勝樂其予眾生之恩惠與眾生之被其感化者亦既深而且厚矣故佛陀為利自利他之偉大人物絕非其他宗教之教主所可望其項背也假令佛不說法以覺悟眾生眾生在迷有如盲者無相悵悵乎其何以行乎哉茲雖佛陀涅槃已久而其所遺流之教法迄今尚存理應香花燈樂恭敬供養常為紀念夫教法為佛陀住世攝化精神之所寄而代表其偉大人格者教法有二聲教行教是矣聲教者何依據佛陀一代攝化補特伽羅之語言結集而成之文字所謂素怛纜藏毗奈耶藏阿毗達摩藏等三藏十二分教也行教者何根據佛陀一代攝化補特伽羅所現之行為融結而成一種精神寄託瞻仰所謂塑造雕刻以及彩畫銅鑄等藉以表現其威儀相好功德莊嚴之塔像也是以教法所在即如來舍利之身如能起塔塑像廣為供養則所得之福德靡有涯際試觀貧女丐珠金師為箔各發歡心共裝塔像九十一劫報感大富良以莊嚴塔像非誇一時之富美檀那功德實為永劫之資糧阿育王之造舍利塔豈徒然哉優填王之刻旃檀像良有以也敝寺為浙省名藍甬江古剎佛化之興隆僧伽之繁衍直與天童育王觀宗三大叢林相伯仲且有過之無不及者寺之西方殿內供有西方三聖丈六金身塑自有清光緒年間中興七塔慈祖之手藝術精緻巧奪天工相好莊嚴堪稱傑作擬雲崗之石佛比龍門之石像不為過也第以歲月遷流金身掩紫磨之光聖像失玉毫之曜此為敝寺美中之缺陷而亟亟宜裝修者溥常承乏主席責無旁貸擬募萬人之緣莊嚴三聖之相庶幾玉毫重增色彩金身再放光明唯是事功浩大需費孔多徒懷移山之願終乏點石之功伏冀緇林上座白社高賢以及護法長官信心居士不住於相而行佈施玉成斯舉匡濟其艱買園布金長者即生天上聚沙成塔童子終證菩提功不虛捐福有攸歸謹啟中興祖堂位於三聖殿後木質雕刻慈運長老像中興祖堂丙子春住持溥常立鄮西范文虎書我佛所宗真如貝葉眾經之長妙法蓮花慈運大和尚法鑒叔平翁同龢法堂在三聖殿後廣五間二弄光緒十七年慈運長老募造法堂民國二十五年春月林森壽世傳燈光緒柔兆敦牂陽月為八十壽僧慈運長老傳戒頌浙東觀察使者喻兆蕃題壽世燈傳光緒三十二年歲次丙午孟冬月穀旦賜進士出身翰林院編修加三級族姪朱卓英頓首書為慈運老和尚八旬開慶志喜法晚寄禪因靜淡雲正明真常妙見悟真好心超有道階頂禮同祝有壽者相光緒三十二年歲次丙午陽月上浣良辰蛟川董思曾書恭祝本師慈運老和尚上壽嗣法人宏教宏緒宏演宏訓宏蓮宏晉宏綱宏明宏淨宏成宏信宏法宏修宏壽宏權宏化宏道宏聖宏滿宏覺宏一宏燦宏楊宏達宏瑞宏深宏引宏得宏海宏圓同頂祝有古德風民國十四年十二月縣人陳磬裁識童第錦書常西法師與余交廿年未嘗見其有喜慍之色蓋其得於道者深矣爰書四言遺之以志景仰圓融無礙圓瑛大和尚主席天童寺禪定育王寺源龍暨兩序恭賀我佛重來覺圓大禪師慈鑒天台山農書弟子楊蓮生常春恆和南敬獻當知是處恭敬供養不可以百千萬劫說其功德若復有人受持讀誦已非於三四五佛種諸善根丙子仲秋漢陽關炯敬題氣秉湘江戒圓章水教普浙瀛福報比諸宗記卓錫傳衣三寶尊嚴宏法脈如來願力彌勒含容普門慈善涅槃留妙相合緇徒白屋四時展拜極追思慈運老和尚淨德千古壬子冬蕭榮爵敬書藏經樓在法堂上層光緒二十一年請頒龍藏供釋迦牟尼佛像藏經樓民國廿五年戴傳賢書湛然真應光緒戊申歲吉立蛟川胡元欽胡和卿敬立龍藏目錄提要慈運大師所請龍藏係清同治九年冬十一月依乾隆三年十二月原刻本重刻于金陵刻經處者現藏本寺藏經閣中完好無缺全目浩繁茲舉其綱要數量以資稽考經藏大乘經般若部寶積部大集部華嚴部涅槃部五大部外重譯經小乘阿含部已上經藏天字號至芝字號計二百八十四字零七卷計板二萬九千零九十九塊計連五萬六千七百三十七連律藏大乘律小乘律已上律藏辭字號至受字號計五十二字零七卷計板五千八百六十五塊計連一萬一千四百七十六連論藏大乘論小乘論已上論藏傅字號至通字號計一百二十八字零六卷計板一萬三千塊計連二萬五千三百三十五連續藏西土聖賢撰集此土著述已上續藏書字號至機字號計二百三十九字計板二萬八千四百十一塊計連五萬五千六百三十二連內原續藏一百五十四種一千二百六十三卷計板一萬四千九百塊計連二萬九千一百七十五連新續入五十四種一千一百二十七卷計板一萬三千五百十一塊計連二萬六千四百二十七連天字號至機字號共七百二十四字計板七萬八千六百十五塊計連十五萬三千三百七十四連天字號內加序及目錄經簽等板計四百二十一塊八百三十七連方丈在法堂之後進方丈民國戊辰年吉立鎮海陳修榆書開山祖塔在方丈中央樓上為莊嚴寮高風可仰光緒三十有四年仲春遊七塔寺見高僧慈運長老暨令法徒自真方丈大和尚領眾行道大有古德高風因留四字以為後進欽頌云仁和高邕書并跋慈蔭堂在法堂東首廣五間民國八年住持智圓建慈蔭堂民國十二年四月穀旦安化陶思曾題本寺住持弘一敬立貝葉傳經民國丙寅年春三月覺圓方丈和尚法鑒弟子王紫光敬贈邗江顏湘泉書正法昌明岐昌法兄大和尚六旬志慶長沙蕭榮爵拜書癸丑陽月法弟友法果如僧晉蓮生賢兆蓬萊自真智圓常西圓瑛道階同祝戒燈續燄中華民國二十三年冬月吉立溥常大和尚宏揚戒法圓瑛敬書法晚本舟式堂德軒勵深大智明校寬明鉅鏞錦堂可亮寶泉法舟寶池見雲惺悟清奇勛明空觀常慧自空瑞岩竹林果成妙潔懷遠玉亮嘉善攸久慈航苾法月定指南密庵明性樂天圓明空印法源善智能安靜明法悟新山同榮得一嵩庭妙勝大亮妙安智根哲明寶成常空瑞蓮普周性源雲谷常學華光蓮度明峯梵雲碧林同敬賀玉佛閣在慈蔭堂上中供玉佛民國八年住持智圓老和尚募建玉佛閣癸亥春月穀旦孫嘯洲書常樂我淨民國九年五月日二等大綬三等寶光嘉禾章四等文虎章調署會稽道尹黃慶瀾敬立妙莊嚴域民國十一年十月穀旦浙海關監督袁思永獻新庫房光緒二十五六年間建新新庫房小廚房民國十四年建老庫房與上官廳大客廳連接地藏殿在大鐘樓之下念佛堂在大鐘樓旁大鐘樓位於大殿東三層躐角式鐘懸於最高層光緒二十四年慈運長老向湘購生鐵鑄造至民國十一年創始集資改鑄銅質閱五年而告成中供普庵祖師像雲水堂在法堂西首廣五間民國六年住持道亨建華嚴閣在雲水堂之上華嚴閣溥常法師弘演華嚴於七塔寺者有年今主持報恩長佛學院乃為題此以留紀念乙亥初夏雪山太虛監齋殿五觀堂大廚房以上三處民國六年住持道亨建如意寮陳慶裁督造祖堂客堂禪堂慈運長老建報恩佛學院民國十七年成立院址設藏經樓法門公推溥常首座主辦著有華嚴綱要淺說行世七塔寺募建延壽堂佛學院啟昔者西伯養老夷望來歸東漢談經王公就學豈非以高年耆德景迫桑榆髦士英才日昇東旭以養以教仁政所先是以事著簡冊芳流縑素千載而下侈為美談況夫佛法高深慈悲居首惠徧于六道四生而恩忽于腹心眉𥈤慈悲之義不其歉歟是以延壽堂開遺制曾傳於往代作人化啟學苑紛立於民初古固宜循今尤可法況精修黃耇實多我法之典型英俊獅兒不少他年之柱石先務之急孰有急於斯二者哉七塔自慈祖中興於鄞治褎然冠首十方輻輳其食指常滿數千締造之功偉矣宏揚之業駸矣顧高勳重望仍旅進於清眾之班寢舍講堂尚寄寓於藏經之閣其於教養之典或未足以言備歟指南以椎鈍之才膺神人之選謬承祖席深切覆餗獨是敬禮老成栽培後進根諸夙性未敢辭勞是以願竭愚公移山之心上續前人未竟之業於延壽則欲臻爽塏於學院則意主寬宏惟時丁物力艱難工則期以偉大狐裘燦爛決非一腋之可成大廈巍峨又豈一木所可就是以呼號檀越共種福田伏祈推博愛之仁惠茲駘背本甄陶之意眾植良材一椽片瓦孰非功德之山老安少懷況符先聖之訓謹綴緣起弁言冊端慨助芳名請列於左施醫藥所民國十七年成立設三聖殿右廂
