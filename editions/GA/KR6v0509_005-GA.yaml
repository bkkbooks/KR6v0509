body:
  text: 四明陳寥士纂志僧譜法嗣線圖七佛毗婆尸佛尸棄佛毘舍浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛西天初祖摩訶迦葉尊者阿難尊者商那和修尊者優波毱多尊者提多迦尊者彌遮迦尊者婆須蜜尊者佛陀難提尊者伏馱蜜多尊者脇尊者富那夜奢尊者馬鳴尊者迦毘摩羅尊者龍樹尊者迦那提婆尊者羅睺羅多尊者僧伽難提尊者伽耶舍多尊者鳩摩羅多尊者闍夜多尊者婆修盤頭尊者摩拏羅尊者鶴勒那尊者師子尊者婆舍斯多尊者不如蜜多尊者般若多羅尊者西天二十八祖即東土初祖菩提達摩尊者慧可大祖禪師僧璨鑑智禪師道信大醫禪師弘忍大滿禪師慧能大鑒禪師六祖下第一世南嶽懷讓禪師馬祖道一禪師百丈懷海禪師黃檗希運禪師第五世即臨濟第一世臨濟義玄興化存獎寶應慧顒風穴延昭首山省念汾陽善昭石霜楚圓楊岐方會白雲守端五祖法演圓悟克勤虎邱紹隆天童曇華密庵咸傑臥龍祖先徑山師範雪巖祖欽高峯原妙中峯明本千岩元長萬峯時蔚寶藏普持東明慧旵海舟普慈寶峯明瑄天奇本瑞絕學正聰月心德寶禹門正傳密雲圓悟林野通奇無礙行徹紀安大經悟性源達界清遠信雲光化正純經導琇普洽英皓報恩堂上第一代第二代第三代第四代第五代慈運靈慧玉忠宏傳果建戒清妙瓏定朗戒常慧明月波宏源善清戒淨性悟定慧德源慧鏡有法宏演紹來戒成歧昌宏蓮常靜戒能梵雲定悟念性戒勤修戒成妙戒可亮戒性本舟戒濟妙勝定慧本慧定觀大乘定能瑞蓮定智諦慧定光圓安戒體明戒瑤永真定傳蓮齋戒清遠戒成法戒住悟靜定安信善戒慧性戒無逸戒性超定善定戒成妙安定觀靜修宏濟了善宏法道清宏淨式堂戒惠普周定祥蓮芳宏秀月良戒明續源宏教修圓戒森演戒瑞林戒成寶蓮定修勵遜戒本來宏淳雪峯戒慧萬德定慧甄定普峯定大喜定谷庵宏訓本性戒明可𠫵定光修峯慧清一禪宏禪海雲戒達光宏輝定法戒源巃戒隆如海定開諦道戒德善智定禪宗風慧蓮果如宏緒達慧戒朗雲戒寶靜定摩法戒原了戒祥林戒寶蓮戒文鶴戒瑩照戒華林戒透禪戒常定戒心燈清定蓮雨成定圓則寬戒靈聰戒最培定摩塵戒朗清戒常學定智僧晉宏晉德軒戒慈妙道定悟了悟慧鎔常空定如寶成定覺智根定修照順定開指南戒利明峯定德碧林定禪妙安定照守真定熙御三定覺法舟戒悟見雲戒覺妙禪戒慧澄溪宏清文海宏光妙宗宏綱從有戒禪靜蓮定錦堂戒德湘源定𠫵常西戒三蓮生宏成明性戒本演法定禪智曦戒智蓬萊宏道別塵戒瑞巖戒錦西宏壽献惠宏化賢兆宏修妙旨戒圓法悟定道朝安慧燈寬融慧靜果潤慧宗修懷戒清得一戒淨法光宏耀普洲戒嚴皓明定環法忍慧旭聖瑄慧綸妙潔戒本常樂定悅德宗定得月峯戒慧能聖定圓演化宏詮自真宏權大智戒道興道戒青幹宏揚清禪戒澄性慧定如竹林定慧乾元戒體賢宏聖智圓宏一真理戒定性圓定方信德慧清超凡戒本自悟戒清佛禪定修碧霞定慧永泉定法月照定嚴密庵戒嚴空觀戒空如惠戒心海霞定智性定慧榮妙理慧潤止于慧澄野僧慧澤明悟慧清宏善慧濟聖修戒心覺福戒定道增戒淨發心戒藏松年戒源自空戒法淨心定安安清定心天喜定祥苾法戒如寬忍定源新善定善守靜戒生培明戒心樂天戒德靜源戒光英才戒性雪峯戒心息凡宏真覺圓宏滿遠塵戒清載通定常林戒相榮池戒品靜明戒德圓明戒遠嵩庭戒高慈航戒渡常靜戒明妙悟戒明固源戒明廣種戒田永明戒慧光明宏開僧晙宏燦寬明戒明新山定圓果靜定慧能輝定覺鉅鏞戒演寬厚戒謙海蓮戒樂道宏來介石宏覺果成戒明現權定修西復定勛萬緣戒岸竹筠戒蔭妙梵戒成能悟戒乘道亨宏達明校戒道梵行定行常信定慧佳衍定大倫定了埃宏引龍海宏珠慧源宏琛行規宏圓如意宏定世復戒藏常西宏宗常慧戒恒月潭戒浪玉亮戒源智明戒慧念真戒詮悟愷戒廣碧巖戒松妙德戒良徹修戒興圓瑛宏悟義明戒智深意定會靈光戒寂法源戒定頌萊戒定善悟戒本慧源戒法煉成戒珠寶歸定心開林戒根白聖戒光顯正戒幢慧命戒香溥常宏鉌攸久戒志寶峯定明守源戒法大量戒慈妙祥戒守瑞開戒圓圓修戒正光明定修聖真戒賢蓮度戒蓮了達戒法脫塵戒慧覺一戒宗量虛戒輝禪定戒德道階宏戒月定戒宗空印戒青甫照宏忝甫融宏慧甫蔭宏雲慈運大師傳陳寥士大師諱靈慧字慈運號皈依湖南湘潭朱氏子母郭氏兄弟三人師其次也少時販米湘鄂間舟出洞庭遇盜盜驚其魁梧欲脅為羽屬師不可盜壯之反其貨且戒羣盜曰朱某奇男子他日邂逅慎勿害年十八忽觸宿願投義寧昌明禪師披薙越二年就野禪聲和尚受具戒咨決法要和尚指示宗門向上一著師即於此決信無疑嗣後參訪諸方知識益明禪淨不二之旨清道光三十年庚戌朝南海觀音大士是為師來浙之始咸同以還卓錫鄞鎮間初蒞接待寺值紅羊之役市井荒墟雞犬無聞比寇至見師獨在叱之曰諸僧皆逸汝敢獨留師從容曰捨佛以求苟生不如誓死以維香火寇感其義授黃旗一並戒眾勿犯時邑中精藍均遭焚劫而此寺獨無恙寇退移錫於鎮之永寧寺同治二年癸亥改主萬善寺庚午受雲龍寺普洽皓公祖燈是為臨濟第三十九世正傳甲戌主席天童寺葺殿宇裝佛像治水利講農殖功德美滿十方稱讚他如開佛光給佛牒建水陸等胥師所首倡光緒三年丁丑出鉢資修萬善寺庚寅徇地方之請住持七塔報恩寺時寺遭兵燹法器蕩然周文學醫師母子苦行募化僅建一二雅志未償賷恨西歸及迎師至慘淡經營始復舊觀古剎中興師之力也初修客堂庫房禪堂雲水堂鐘樓並設監院知客維那各職規模略具次年重塑大殿千手觀音聖像以湘刻五百羅漢供於周壁又次年傳授友法月波岐昌一禪本來玉忠等為法徒令肩各寮執事修築三聖殿新塑三聖法身高二丈八尺有奇莊嚴妙相甲於諸方又三年為西方三聖像及千手觀音聖像開點靈光翌年赴都請頒龍藏勅賜報恩寺額翌年丙申師世臘七十傳授三壇戒法翌年建藏經閣重修開山心鏡祖塔又翌年向湘購置大鐘一口重一萬八千餘斤厥後造自流井建香積廚凡百工事不一而足至歲丙午師年登八十復傳壽戒成就衣鉢具及海青四方前來乞戒者甚眾宣統二年庚戌八月二十九日圓寂世壽八十有四僧臘六十有七築塔於天童玲瓏岩下門下法眷化及四方遠至南洋印度日本台灣聲聞廣大余少時常見師又數從岐昌圓瑛智圓溥常諸上座游備聞行誼因次其要者為之傳皈依大師傳王宇高師諱靈慧字慈運皈依其號四明七塔報恩寺主僧也寺為唐代古剎再被火廢焉清光緒間師為營度建置凡浮屠所宜有者無不粲然完具僧徒來歸日益眾遂復唐時舊觀世稱七塔中興第一代云師故湘潭朱姓母氏郭兄弟三人師次仲稍長詣義寧福田庵為僧既受具戒走南北參訪道光間來浙謁普陀觀音大士咸豐時至四明居接待寺同治癸亥徙萬善寺庚午得雲龍寺普洽皓公之法實為臨濟正宗第三十九世也甲戌主天童寺踰三年復居萬善最後為七塔主僧光緒庚寅迄宣統庚戌凡二十年以八月廿九日卒葬於天童玲瓏巖之下年八十四為僧六十有六年初師於接待為汎掃香燈時洪楊之黨入境寺僧奔竄無一人獨師留眾兵見師潔除已焚香佛後拜跪氣度閒靜異焉圍觀良久乃問汝不去獨不畏死乎師笑曰出家兒不知有死生也其魁出黃旗一樹寺門兵遂不復來是時四明諸寺多被劫或焚而毀矣而接待賴師以全其居萬善萬善故圮陋不可居師誅葺其中有終焉之意既得臨濟宗傳道行益高天童有僧數百人羣欲保師師以天童為東南名剎既遭水災時人又唱言廢佛日益亟乃入主天童天童寧謐如故其興七塔之功為尤多紺宮妙相極莊嚴於廢敗間而臨濟之教造就無算玉忠等四十八人名尤著宗風被海內外矣而四明天童育王觀宗雪竇施祥接待總持龍聖看經德雲大隱等大小數十百寺其主僧迄於今大抵師之門弟子也贊曰余未嘗見師而與師門弟子圓瑛智圓覺圓常西溥常僧晉及本舟寶靜指南輩往還聞道其師未棄家時嘗販米過洞庭湖湖中盜劫持之欲與昆弟盟師從容開說盜皆感泣卒為良民既主七塔數數歸湘潭省父母墳墓其季佑琳讀書能文余觀佑琳所為頌師八十文其篤於父子兄弟間為尤可慕也嗚呼有為者不擇地而成若師之建樹尚得以空門寂滅而視之哉勅賜報恩七塔寺方丈皈依大和尚七秩開壽序朱佑琳世俗於人耆艾以上往往即其誕辰召戚友設筵宴以為慶會而又必有壽之之文張之壁間相與讚揚美德至於釋氏之法則無取乎此然家人兄弟之間藉以達其惓惓之情非世之徒侈虛文比也佑琳世居湘潭仲兄皈依大和尚去家四十年邈然不通音問一日郵書自浙來道已祝髮為僧見主甬之萬壽寺琳乍聞之喜極而涕蓋琳兄弟三人琳幼出後季父伯仲無祿兄遠遊經洪楊之亂干戈阻絕零丁一門歲時烝嘗顧念凄痛洎琳有子三遂以其次者還後伯兄小宗而季者立為兄後豈復意天壤內尚有兄蹤跡耶當兄出家時先考妣固無恙也而別父母離手足孑然孤往遊方之外此於世一切情緣宜痛斷之毋少顧惜何兄若猶幾幸其親之存而必一得當於家而已耶琳又以痛先人之不及知也以琳觀兄之所為自主席天童以至恢復七塔凡所設施具有端緒教授徒眾常數百人修持律儀毋敢違迕過人之才亦可想見設使兄終老鄉井主持家政當必承先啟後赫有光耀非若琳之碌碌者然自俗情測之未必不以是為佛氏之幸而朱氏之不幸雖然馳逐於利慾縈迴於富貴嗟素志之難償窮白首而不息以至喪失本來全汩性始者固凡人之通患也然則捐嗜屏愛薰修戒行如兄之入佛知見所得要為獨多也嗟夫稟天地之靈體父母之德儒家之教亦以率性為宗雖釋氏清淨妙覺與所為明善復初大旨稍殊然能獨葆天真無或陷溺實為不忝所生而世俗之所謂孝養又不足言也故兄雖萬類皆空獨時時不忘其所生精氣感通乖隔逾久卒能有以致之然後歎琳之於兄為可愧也篤翰飛之思感令原之誼琳雖撑支門戶艱苦萬狀而清夜返躬茫無主宰兄豈能分其孤照以發我微明耶乃知人之全其所受固在此不在彼也戊子之春琳訪兄於慈谿逾歲庚寅兄始一返里門相與聚處久者逾月近者兼旬遽爾分離不可合併楚山浙水魂夢往還又已七更寒暑矣寥廓天涯茫茫來日握手歡笑能復幾回今歲丁酉十月六日為兄年七十一誕辰琳故道其思慕之私特為文負之來祝靈巖風雨白髮連牀兄其拔之塵俗而毋使終迷則幸矣回憶幼時侍先人側思兄嗟歎情事如昨然則今之得重逢晉觴為壽當非琳之所及料也兄既入京師請藏經並蒙御賜寺額而雪竇靈岩諸名剎又皆其法嗣住持由此大倡宗風傳其衣缽綿傳千百世而無或衰息若使家道之興亦若是焉則尤兄之福蔭也乎祭慈運先師文嗚呼先師降生於湖南之湘潭朱氏年僅十八辭親出家二十受具徧參有道吾師天性慈善定力難思溯同治壬戌歲髮逆犯境人多避難吾師是年三十有六朝山進香南海旋甬挂錫於城外接待寺其寺僧駭聞賊勢兇湧畏難而散維吾師不忍棄佛立志獨守鋒煙不能亂其心兵刃不足挫其志佛火供事仍然無缺此則吾師之大雄也既而賊退地安吾師移單于鎮鄉之永寗寺初該寺香火蕭條佛事寥落十方檀越無從皈依吾師晨鐘暮鼓寒暑不休誦經禮佛晝夜無間于是十方善信慕道而來遠近檀那聞名而至一時聲振百里風歸此則吾師之大悲也當時李𧘅橋有萬善寺者敗椽破瓦斜立三間矮柱低檐高可八尺名僧難住佛子同悲吾師見而忻然蓄意改造苦無施主力難措手低頭曲躬者非一日抱足半眠者亦有年此則吾師之大忍也同治甲戌師年四十有八忽爾宿緣感發勝事遙臨太白天童推為主席四房兩序堅請莫辭及至升堂百廢具舉適洪水橫流淹沒田稻坌土拔木崩裂橋石一經水退修復如故所苦香火清淡僧眾數百法輪可轉食輪難調時兼當道宰官就地紳董禁行佛事停止水陸吾師情懇護法運動廣文始可轉行佛事漸廣香火遠來近悅日日增茂三載期滿靡不讚美此則吾師之大願也然而天童退院萬善棲身奈何棟宇低矮而更陋僧眾願住而難留於是吾師自傾囊缽並募世緣經營改造革故鼎新其間善信說三皈之禮或來護法助粟帛之緣陸續改造豈僅一載百苦忍辱奚止萬端每逢開光勝會水陸道場有波旬主唆而禁牒有闡提興禍而索財重重逆境指不勝屈至今功堪告竣人已老我雖非為名山之列聊可安行脚之僧此則吾師之大力也維人生立命必有其地地方當興必有其人甬江有七塔寺者古之一大叢林也遷年越世疊經兵燹寺毀僧空腐敗不堪初有就地醫生周氏母子立願重建晝夜鳴寒暑不斷嗟乎苦行已極功成一二母子中道相繼云亡時光緒十六年庚寅歲吾師法臘六十有四地方紳董請為住持吾師力難推却事亦當肩入寺後築地興工開單接眾僧有百外米無兩月逐時設法借貸檀越雖饔餐不繼而經營續續其間完西方殿供三世尊築鐘樓鑄大鐘建兩廊立禪堂請龍藏造藏經閣開戒度僧於五處講經說法有六期凡所至要盡行備畢疊疊工事不勝枚舉捍勞忍苦迄今二十餘年將見叢林規模擴然維新慧炬高懸光明徹於海內法衣遠播恩澤及於林間此則吾師之大勛也嗚呼功成萬代人無百年竟然一旦而歸淨土者使弟子輩有身莫贘無腸不斷原夫死生同幻真性常存吾師在白毫光中洞然寂然而無間隔嗚呼悲哉如吾師之精力殆盡於此則吾師之志願歷千百劫而不磨矣凡弟子輩入吾師之室者能不酌水思源報功頌德於萬一耶今屆靈龕將起化佛遙臨直達松關高登蓮國栖心自在任歲月之去來說法無生猶浮雲之聚散太白從茲有主玲瓏永為低頭嗚呼悲哉吾師竟棄弟子等而寂滅已而弟子等箴言在耳孝悃難陳愧無鶖子之先知仰效純陀之後供嗚呼悲哉伏維尚饗慈運老和尚塔銘從來國家鼎革之際必有傑出之人徵之歷史莫不皆然有清入關以來二百六十餘年其間治世人材炳煥中華盛埒唐宋而方外宗乘亦極一時之盛降及中葉浸衰季世更屬式微大闡宗風者希乎其渺良以國家多故崇尚無人慧命懸絲幾乎一息惟我皈依慈運慧公老和尚潛修浙水密行默化守以誠樸持以忍辱柔和化以慈悲敬信始也士女皈崇繼也縉紳維護居甬五十餘年長幼尊卑中外商賈乃至勞動工役無不知有皈依長老者每一見之頂禮問訊供養如活佛然其恭敬尊崇之心發於中形於外不自知其膝之屈也感化之誠有如此者且也人天密護大用現前開堂太白戒徒萬指說法七塔法眾千僧其得法入室者四十餘人皆能建白各擅所長隨機應化者若干開堂秉拂者數十談經宏教者五六精通禪奧者二三其他建立剎竿敷揚海外者七八誅茅闢地異類中行者尤多噫法筵之眾何其盛也法侶之勝何其極也和尚生於道光丁亥十月初六日順寂於宣統二年庚戌八月廿九日或者預示鼎革之徵歟入民國來其門人化及四方若湘若滇若蜀若陝若閩浙蘇贛皖豫南洋印土日本台灣皆有法幢光明是殆勝清末一叚光明乎民國建始之法幢種子乎異日者法遍全球化週海外吾將於七塔禪寺法眾高人企予望之語云莫為之先雖美勿彰莫為之後雖美勿傳其斯之謂乎爰記其實而銘其塔後之覽者可讀作真身塔銘可視作大光明幢乃為銘曰維嶽降神誕彼三楚湘南潭北朱氏巨族厥生大德豫章剃度大菩提寺潛修默悟化緣甬上說法天童中興七塔道化邳隆中外信仰緇素皈崇靈山法侶雨霈雲從清朝民國繼續興隆化被海外道播寰中法燈晃耀徹照無窮光光回互法法宏通臨濟妙旨踞地稱雄慈力三昧彌塞蒼穹光明幢子永曜浙東分映沙界如日之中前清勅賜七塔報恩寺方丈慈運大師塔銘前資政議員簡任政事堂法制局參事羅傑撰文臨濟第三十九世有法器曰隆安大師者湖南湘潭朱氏子初從昌明禪師披薙受具戒於野禪聲和尚已而徧參江浙善知識普洽長老契其根利為傳法印遂以號為止念法門久之法席宏展外護交崇推主天童七塔萬善等寺以清之宣統二年八月二十九日示寂於七塔寺安骨於寧波太白山右世歲八十四僧臘六十有六矣其未祝髮時也嘗貿米湖北道洞庭為盜所掠盜喜師魁梧有智略昂然美丈夫脅籍其黨要以不義之利否則必之死師誓死不允盜壯其志自反所奪且曰厥後朱某經此有加害者必罰之初蒞寧波充接待寺苦役時洪楊之亂雞犬無存住持等棄而先遁寇至謂師曰諸僧已逸汝胡獨留對曰我非不欲求生我去誰侍佛香火者心不忍耳盜義之與以黃旗且戒眾曰犯此者殺毋貸當是時全邑精藍焚劫一空而是寺賴以無恙難平住持等歸疑師恃功而戀贈金速行師一無所需而去越五十餘年寺主子孫衰落典是席者為其法徒蓋亦天之報施善僧也耶其卓錫天童七塔也甫駐天童百廢俱振未幾大水田淹橋裂損及廟貌雖旋規復而檀越希蹤重以吏紳阻行法會停建水陸道場四來苾蒭饘粥不繼師口苦心誠感孚學官得弛前禁自是禮佛者不絕於道而衣單實賴焉七塔寺者唐季叢林兵燹迭攖宇圮僧散雖有周氏母子苦行倡募厥功未竟賫願偕亡師主是寺貧邁天童緇流聞風來以百計於是舉債新營莊嚴諸佛請藏佈法宣戒度僧信施日眾水陸道場同期競建歲以為常舊俗凡尸离者攜眷入聚茹葷款客歌姬雜沓師乃撰規痛革肅肅至今世稱七塔中興云師字慈運號皈依生平為人臨禍不怖義利區明住萬善垂二十年艱難創復大率類是至其慈懷濟物不訐不矜在他人所不易能者其次焉已法徒四十餘人或性相澄通或專勤頂佛或禪智默照淨土趨心僧俗欽愉長方丈者已過半矣嗚呼盛哉民國戊午秋余供阿育王寺釋迦舍利道經七塔其弟子方丈僧晙等述先師事狀且曰方君延齡嘗為先師建窣堵矣今同門諸友醵金廣造請狀乞銘余既闡其大凡用貞諸石以告來際乃為銘曰猗法王之苗裔兮瀕險變而不懼貪嗔癡不可毒兮寺既完而退故住禪侶翩其腹枵兮感財施於功德主樹與鳥共演佛音兮神棲遲於西土播巨德於茲銘兮併住劫而悠久四大倘其壞空兮文與石兮何有性無生惺惺其不滅兮豈與質相者俱朽慈運慧祖百歲紀念撮影讚諦閑十界一心凡聖同居于法會萬年七塔主賓共聚於祇園當慧祖百歲壽辰作報恩千秋佛事常光寂照徹證心源攜我迷流同遊覺海噫法界藏身隨處現虛空張口石點頭大和尚岐昌法師六十大壽之序董思曾等大江以東有崇壽寺焉樞四明鎮勾甬居斗嫠上絡以持丑紐寺之舊名曰棲心明時遷南海之燈傳於此顏寺曰補陀寺外有浮圖七俗又呼寺曰七塔其曰報恩崇壽寺者則自寺慈運長老北取藏經而始名也今之主寺者為岐昌師年登六十矣下元之日其生辰也里中故交以為盛事將頂禮敬祝爰貢一言以序之師鄞人少時祝髮於永豐菴中為菴主安法師之再傳弟子從讀邨塾書過目輒不忘同堂不之如也稍長學詩取法六朝而端莊過之書法宗趙姿媚中有蒼勁氣生平事佛以名理取勝上乘者採而發明之若因果之說則勿道也性亢爽喜與學士文人交縱論今古事永朝夕不少厭好遊之楚之蜀之吳越足跡半天下名山大川久深閱歷獲於心者多見於道者宏修於己者真信於人者實以故隱居斗室中而名之傳於外者無論識與不識莫不嘖嘖稱之曰岐昌師宣統庚戌崇壽寺慈運圓寂主任之人經大眾開議僉云非師不可師亦以慈運長老為付法師情不得卻如所請進院之日送者塞途道路觀者共贊歎而羨其賢夫崇壽寺為勾東巨剎飛錫掛單僧人眾多一食約盡粟數石而榖冊之所有又僅僅無幾量入為出溢出甚巨苦心焦慮維持少策爰大開道場廣延壇越師取信於人久聞風麋集堂為之滿事後而所得纍纍矣此非孳孳者比也蓋舍是不足以搘拄常住耳至於復湮沒之故迹新澷漶之舊觀可仍者因之可除者革之無侈於前無廢於後此瑣屑之事尤不足為師殫述也前清變法創學校以化僧徒民國肇基立佛教分會以襄理大事夫釋家凌夷於今有年一經有力者之振作而大發其光俾窮鄉間古菴舊院得以信教自由不為人所佔奪者非師之力焉得而至此余等多方外交或潛修一室不予人相近或奔走風塵不知老將至求其行止有定動靜有常而執適中之道者曠觀沙門中殆難其人而師則巍然一老表正眾界溫而厲寬而嚴垂暮精神依然少壯天留此靈山壽相為法門生色是亦西聖一綫之繫也故大書之以為大千之世界告中華民國二年陽歷十一月中旬宜壽之辰方外弟董思曾謝行溎張世謨姜永賡陳冠雲上頌岐昌老和尚八十冥壽啟太虛寧波七塔報恩崇壽寺岐昌老和尚乃太虛之授經師也本年夏初展禮授經故居永豐寺距師圓寂垂十年矣寺由師再傳法孫妙安住持已煥然一新求師之手迹遺文而不可得為悵然久之頃師之法子七塔寺方丈本舟和尚等以十二月二日即古歷十月十五日為師八十冥壽之辰將於七塔寺禮佛稱慶囑為文以彰先德顧太虛雖以八指頭陀之介親炙於師者幾二年亦祇識得師無疾言無遽色溫文爾雅恭穆淵懿之品德而已於師生平事迹殆茫乎其未有知無己姑摭采所傳聞者以述之師鄞縣東鄉錢氏子幼作沙彌於永豐寺讀書塾中與故邑紳董淡生等同窗咸歎為弗如詩文學六朝而能端莊書法趙松雪而姿媚中有蒼勁氣故甬中文學士靡不推重具戒後與八指頭陀諦閑法師等為友乃於宗禪教理亦深入玄奧尤擅音聲佛事遜清光緒間川湘蘇皖遙及晉冀之修建水陸道場者皆禮聘師為內壇正表師以之遍遊長江黃河流域朝四峨五臺登覽衡匡金焦諸勝若夫普陀雪竇天台天竺天目天童之近在浙東西者更不待言因此遐邇識與不識皆慕水月法師名水月乃師之別號也余固知名佛教緇素之詣四明者必造訪師居師乃能潛養斗室中遍參當代之善知識德望亦以日隆師一生功業之犖犖大端首為輔佐且繼承慈運老人之中興七塔七塔舊名棲心明時分南海之燈曰補陀寺至清季頹廢已久師既嗣法慈老以慈老自天童雪竇退而住持七塔新立叢林規制僧眾雲集饔餐維艱師既慨然斥永豐寺所有田充七塔齋糧於是七塔寺始稍有恆產漸蔚成與天童育王鼎足而三之一大剎宣統二年慈老示寂顧其寺內既絀財而外又多故慈老嗣法數十人咸以為非師不足繼承慈老以竟中興鴻業師不獲辭搘拄其間者數年遂安奠七塔之基石迄今蒸蒸日上而未已次為輔佐且繼承八指頭陀之護弘佛教光宣至民初間八指住持天童適值全國提僧產興學校之風起時各地設僧教育會為護持教產弘揚佛化之圖八指身任全甬全浙以至全國之重而根據地之寗波則多藉師臂助民元八指辭世寧波之僧教育會改組為中華佛教總會分部既舉師為之長凡七八年今甬佛寺僧業之盛冠全國者師與有其力而寗波之佛教孤兒院及三寶經房亦師之手剏而垂續迄今者也師詩筆俱富而書扎尤精妙身後竟蕩然無存使今日已無可徵錄以傳後者斯則最堪遺憾者也第師之學行粹美德業俊瑋固昭然照耀丹山赤水間當與如來寂光同其金剛不壞豈惟足以壽世而已哉民國二十二年十月二十五日受經學人太虛拜撰僧晉首座禪行略無住師法名宏賓字僧晉湖南永興縣宋氏子父忠仁母李氏禱白衣大士而生師師生三歲喪父貧不能就學稍長聞里人講孝經及古人嘉言善行好之浸及佛典乃大好之遂翛然有出世想年二十請于母詣南嶽極樂堂禮覺否上人為師默庵法師其師祖也默公以宏法名東南門風高峻師以失學故艱于講習默公曰捨俗出家或禪或教或苦行爾宜自擇其一反是者非吾徒也師毅然請以苦行自任旋受具于祝聖淡公逾年禮金錢碧公請問苦行如何碧告以百丈一日不作一日不食語師自是確守其說至老不敢自佚也光緒辛卯禮普陀遂留七塔時慈運老人自天童移主七塔年六十餘矣襤褸啟山昕夕無暇察師真實付以法印旋委管鑰自是以常住自任者四十餘年所歷胼胝拮据不可殫述光緒戊戌兼任銅盆浦白龍庵住持寺殘廢已久至師乃亟謀力興經營十餘年大功方竟巍然為鄞南名剎民國丁巳忽燬于火師號痛自責善信感動爭醵金重修師擴其制而輪奐乃逾于前乃易其名為龍聖寺師雖致力于白龍而精神常注于七塔盡以生平撙櫛所餘缽資數千元助七塔齋糧師自奉極約粗衣淡食終歲不耗一錢雖疾病不御醫藥而急公則不惜巨款大率類此七塔自慈祖中興嗣為住持者多法門英俊故久益熾昌師以資望功績數被推為住持皆峻拒之而擘畫大計實總持于師隱若長城之寄焉門下剃度者五多不壽惟式堂今為鎮海普慶寺住持于七塔歷任都監監院勞績最著得法者五德軒重興水月寺後於小白嶺誅茅開山結德雲精舍居之為七塔監院最久又嘗為天童監院其淡泊任勞綽有師風焉指南現為七塔寺住持事蹟另詳法舟今為上海心安寺住持見雲為鄞東雲龍寺住持妙禪為杭州開元寺住持自師以苦行助慈祖興七塔門下皆效師行持故諸方多請為住持廿五年秋師壽晉七十法剃徒等為師營壽塔于小白嶺德雲精舍之右明年刻石而銘之文多不錄蓮生法師傳林德祺法師湖北夏口縣人俗姓劉自幼聰穎有宿根年甫八歲依夏口關帝廟崇道法師為沙彌法名果增其師課以文字過目輒成誦高僧見之僉謂異日必能大弘法教師亦昕夕自勵無或怠荒七年後度為比丘是歲仲冬受戒于夏口歸元寺法名湛然潛心經典不遺餘力暇則精研岐黃術以奉行我佛救世本旨而濟眾生又七年朝四大名山遍歷南北諸省訪師問道風餐露宿備嘗艱辛晚年痰疾蓋潛伏於此云旋住錫於鎮江金山寺年三十有二至鄞入七塔報恩寺受皈依老和尚法更名宏涌於是精參內典深悟上乘佛理四明文物之邦士夫多信三寶七塔寺為著名古剎問經旨者戶外屨常滿師輒善為講授且工書畫與都人士益相契平時佐皈依老和尚重整寺規以中興佛門為己任光緒甲午年三十有六師以城市喧囂不適淨修移錫城西集士港廣善寺寺無恒產破屋數椽聊庇風雨青燈古佛景象蕭條師則茹苦含辛廣行方便善男信女染病來寺求診靡不為之悉心調治而力卻其酬赤貧者且饋藥餌蓋本我佛慈悲之旨也由是病者紛至沓來不遠千里或住寺中師輒以佛法相點化俾清心而寡欲則攝生而保身聞者感悟指不勝摟事後或就寺布施以結善緣數十年來廣殿宇添佛像鄉僻小寺煥然一新且具大叢林規模非師之以善化人曷克臻此附近俗家子弟有敏而好學無力求深造者輒助以資俾成大器受惠者亦歷歷可數愛護老弱疲癃之僧侶更覺無微不至近年擬募化齋田數十畝以充寺產迺于民國十八年仲春某日示寂所願未遂惜哉彌留時神志清明異香滿室口宣佛號詎不異歟俗壽六十有九僧臘六十有一涅槃以後遐邇僧俗念師生前韜晦僻處鄉陬佐如來以闡教利生而活人無算其出家之雄乎屬余傳之以為真實修行之模楷云澹禪和尚塔銘大壑有魁梧奇偉之姿必具經綸拔萃之行故我佛釋迦相好無倫而說法利生亦不可思議證之歷祖比比皆然法華深譚莫過十如而首揭櫫即曰如是相也以是觀之形好一端盍可忽乎哉澹禪和尚者即俊偉大人之相也諱宏緒別號誅道人定海金藏薛氏子母孕師時夢行脚僧托宿師誕之後志行邁於常兒七八歲時蛸飛蠕動微生之物悉知愛護間有僧侶過門師必牽裾弄袖樂與攀談而莫能釋焉有識者知師性之所近且曰此兒非薛氏之千里駒乃佛門之大龍象也年方志學見東隣少婦染病忽卒即慨然曰世相無常一至於此吾若不他謀將何異於是耶棄俗之心由是決哀白於母母憶其托胎之朕知有夙根許之詣里中普濟寺松公上人乞度上人窺其六根端秀形貌異常他日必為法器欣然諾薙髮之後佛前執掃誠懇端莊如事生佛繼為授戒聞闍黎訓誨律範有戒殺等條始恍悟幼時護生厭殺及母言夢僧投胎蓋有由矣師秉戒後洞識開遮精持梵行秋霜冬雪無以喻之雖多年耆宿一見而敬且憚焉未幾松公圓寂眾遂公舉住普濟寺經營未久山門增輝遠近善信翕然嚮化嗣聞雪竇慈公為當代宗匠卓錫甬江棲神七塔法輪大轉海陬馳名羨道之心油然勃發遂躡屩擔簦趕趨百里一至席前即叩道要慈公知為不凡品也語多激發命入禪堂而參究焉師精進心現晝夜不懈一日聞擊板聲豁然有省始識慈公之道越尋常名不虛也次日陳述所見慈公笑而領之曰住行向地同悟此體而位位修證功用相差不啻天淵縱如大鵬一舉九萬而中間尋尺亦自歷然爾宜深修極證莫作得少為足人也遂授心印錄副寺事無何慈公入滅及門諸子惟師道貌兩俱逾恒顧命繼席雪竇師面承屬授銘感殊深力擴前規大興土木而舉世絕無之說法堂煇煇煌煌嶐嶐崗崗高矗雲際有若與天人而爭麗也前後殿廊凡稍圮者次第重建巍然為一代中興主焉厥後如京師請大藏供奉崇樓以表一寺三寶具足清皇嘉悅特賜紫衣人中之榮法中之盛至此殆蔑以加矣嗚呼偉哉八年仲夏驟示微疾語諸子曰吾機薪已燼應火當亡爾等宜知人命無常出息不保努力加修資粮備足吾一生修造太多緣念過甚到此風刀解體之時定力缺乏頗有不自由在爾等及早圖之莫作墮宗風人也言訖奄然而逝世壽五十八僧臘四十餘余曩遊名山一涉雪竇初到法堂驚未曾有再覩師像拍案稱奇問諸淨侶曰斯堂即斯人造也嗚呼殆所謂貌行相符者歟至若師之遊藝工行草精點染寸縑尺素重若拱璧是年某月日寺眾瘞師於寺之東南若干步門人朗雲性菴等均余舊好以師之行狀相屬余不敢以譾陋辭謹將師之犖犖大者詮其次第勒諸貞珉光耀未來云爾銘曰雪山千仞兮中有至人瑰貌琦行兮罕與其倫精持梵綱兮皎若冰霜悟道甬江兮毛骨清涼法堂崇嶐兮高若天隣三藏供奉兮尊越七珍末後垂範兮如遺環漿藻翰游戲兮寶逾旃香衰世執頑兮單鳳隻麟吁嗟茫茫兮誰知師因道階法師行述邵章距今二百年以上閔忠寺改為法源寺傳天下僧徒千佛大戒迎文海法師於江南寶華山繼法席闡宗風十傳而至道階道階生當清季佛法中替廢寺興學之說蠭起道階集緇白之流以一手障之余之來京師也識道階久迄乎戊辰之夏京師瀕南遷矣道階航海求法於印度南洋之間臨行與余握手為別庸詎知道階之一去而無東歸之日耶按略師諱常踐道階其字也號曉鐘別號八不頭陀俗許氏湖南衡山人生於清同治九年庚午七月十五日幼讀書成童即茹素光緒十五年二十歲出家禮衡州東一堂智勝寺真際為師冬從耒陽金錢山碧崖律師受具足戒次年春即聽律師講法華授手一日三座五閱月始畢夏囘衡州瀕行乞律師指示了生脫死法遂授以狗子無佛性話頭參究半載因禁語坐禪七得一入處請律師證明謂此是入手工夫稍有相應之象再坐七日方有消息至六日忽心地開朗質之律師謂是暫現之境亦未了當再用工夫自有著落處未幾改住岐山仁瑞寺與田靜覺明二長老參雲門桃花及古來大善知識話頭次年詩僧寄禪即自號八指頭陀者來山坐禪七便請開示遂參念佛是誰話頭經四七日聞禪堂開靜木魚聲覺身如雲飛心如月朗半日絕無妄念一段白光照徹無礙寄禪勸入關謂抱著話頭不輕放手自有打成一片時及入關二載心中開大悟境八次小悟境數十次暇則看經而各宗教觀尚未深究次年春南嶽默庵長老來書云參禪與教觀皆宜深究吾老矣傳未得人俟汝出關盡可傳授遂從默公閱大藏經學台賢慈并律禪淨各宗奧旨一日坐次默公云今之山河大地高下不平者實是我心不平若心平一切山河大地皆平隨默公語聲得大徹悟回顧禪教諸宗典籍廓然一貫口有所辯如流水之莫禦矣先是出家時立有四願曰十年讀書十年治事十年注書十年念佛光緒二十一年二十六歲出家已踰六載遂開講法華經授手於衡州西禪寺學徒盈室日講不暇旋在永興縣龍角山講天台教觀并注心經玄義詳略各一卷證之默公呵曰注書一事談何容易古人數十年用心只得一二部便將大藏全書理事融成一貫如天台清涼永明諸大老輒數十年後方事箸述汝年未及言不足法自宜將平日戒幢高立行解相應禪教相融不立一字不舍一字在行止坐臥處揚眉瞬目處見個明白左之右之俟純淨光境現前毫無間斷其時方可下筆此則事事皆是否則事事皆非戒力不堅龍天不護即著書行世亦是世間狂慧與了生脫死全無關屬出家為了生脫死而來若不詳參及此轉眼無常一到如落湯之蟹又空來一次矣師聽畢毛骨為悚每日祇靜默看經不敢他涉二十七歲總理衡州羅漢寺戒壇為教授師二十八歲總管西禪寺修造並戒壇為教授師二十九歲總理鴈峯寺戒壇為教授師三十一歲為南嶽上封寺戒壇教授師又為培元寺教授師冬受請為金錢山住持三十二歲在寺講彌陀要解及二時課誦凡九十日冬開壇傳授千佛大戒得度僧眾三百餘人三十三歲為永興縣西竺庵戒壇教授師又因建造大殿山門需資綦巨募款浙江受寗波天童寺請講彌陀便蒙鈔三十四歲受寗波七塔寺請講成唯識論冬回金錢山傳千佛大戒三十六歲又受天童寺請講法華經三十六歲復在天童講楞嚴經聽者千餘眾自光緒三十一年至三十三年在此三年內既發起為金錢山請大藏經又為保護各地寺產計協助寄禪創設杭州寗波南京湖南各佛教教育會嗣矢志周遊印度求舍利經南洋羣島如檳榔嶼新嘉坡緬甸錫蘭等處得玉佛六尊佛牙佛骨各一尊貝葉經一函舍利一瓶都四十八粒經年返國三十四年年三十九入京師請頒大藏經時頗欲遁迹雲山踐十年注書之誓而為清一長老力挽護教謂雖有光緒丙午保教之諭然各省教案疊起非在京師建立佛法不能盡護教之責于是登五臺山燃頂香九炷立四大誓一願保護天下佛像不毀我願即了否則盡命不退二願保護天下寺廟不毀我願即了否則盡命不退三願保護天下寺產不毀我願即了否則盡命不退四願化導天下人民不駡僧徒我願即了否則盡命不退宣統元年清公為引緣接北京弘慈廣濟寺志果老人法座秋大藏印畢回金錢山傳千佛大戒次年春受衡州南雲寺請講彌陀疏鈔夏盡辭湘省傳戒講經事業及金錢山住持一心北上護教時志果移座法源寺遂在弘慈廣濟寺立僧自治研究會又與李翊灼等數十人立佛學研究會於象坊橋觀音寺講大乘起信論募設佛經流通所三年夏受龍泉寺請講大乘起信論義記凡九十日旋發起中央佛教公會佛教僧林會冬志老退位即由僧錄司呈內務府奏請欽定為法源寺住持年已四十二矣民國元年秋立佛教會於法源寺寄禪為總會會長師為機關部理事長僅九日而寄禪圓寂寺中師親送靈骨回天童安塔二年夏與嚴復梁啟超王式通孫毓筠羅惇曧等數十人發起佛誕二千九百四十年紀念大會會期七日大眾欣贊復受七塔寺請講楞嚴經冬回金錢山傳千佛大戒三年春回法源寺創辦法師養成所成就學僧二十餘人四年秋接南嶽祝聖寺住持冬為耒陽雲山天中寺教授師又為羅漢寺教授師清涼寺教授師五年冬在祝聖寺傳千佛大戒又接羅漢寺住持六年夏在寺講法華經授手接花藥寺住持又受北京宛平縣選請為天寧寺住持七年受南京毗盧寺請講楞嚴經八年春在法源寺發起為歐戰陣亡將士建三年普濟水陸道場夏在羅漢寺講法華經授手九年冬傳千佛大戒接天中寺住持仍回法源寺主修續高僧傳三年成書六十卷十年春領北五省災民數百人在京師周城募化三日又為佛教籌賑會總務長領災民代表數十人往江浙普陀等處募集賑款夏在七塔寺講梵網經冬回法源寺傳千佛大戒並作圓滿歐戰水陸道場十一年復在天中寺傳戒十二年春約熊希齡廖名縉王式通莊蘊寬等在法源寺發起二千九百五十年佛誕大會會期二十五日感化世俗更勝於前十三年在法源寺傳千佛大戒冬在寶慶點石寺傳千佛大戒十四年秋赴日本東亞佛教大會舉為副會長周遊日本臺灣十五年夏在弘慈廣濟寺講法華經冬又在點石寺傳千佛大戒凡此皆在我土之卓卓可紀者迨十七年秋師年五十九矣重發大願遊印度南洋各地考尋佛跡搜譯遺經以期回國後宣揚大化利益羣生不幸功業未竟於本年二月初一日圓寂於南洋怡保三寶洞世壽六十有五僧臘四十有六總其生平住持道場八處傳大戒十一壇講經十四座各大剎戒期任教授師二十餘座設維持佛教會及創辦教育共十處其他特殊靈異事蹟書不勝書噫嘻偉已余於辛未之夏南遊金陵宿寶華山隆昌寺禮銅殿觀石戒壇穆然於誌公之遺風與文海之勝跡誠為凡僧寺戒律發源之地故傳戒莫盛於寶華而旁衍於法源雖藉世間法之宣揚要為夙緣所定不可强也道階承其緒而光之適當毀寺滅法之交其艱苦殆有百倍於文海者而卒能本大無畏之願力使危者復安傾者復正固宜人天共仰垂聲稱於無窮惜乎其晚年之宏誓有所未踐也昔元明間覺源禪師住持金陵天界寺洪武三年奉使西域行一載至僧迦羅國國王館師于佛山寺未幾示寂五日顏貌如生王大敬歎築壇荼毗之有白烟一道上燭於天舍利不可勝數金華宋潛溪先生為其衣塔銘師之行跡毋乃類是余不文重其法孫梵月之請爰徵其行事與夫關係于法源寺者告之世人焉建國二十有三年歲在甲戌仲秋之紀古杭邵章撰道階法師行解相應清末以來巍然為佛門泰斗其于維持佛法關係至大功績至偉此文敍述詳盡其言少時用功得力處更為真切不惟大筆如椽抑且深入法海晚近以來巨製也惟道公以宣統庚戌來甬留住七塔者數月得傳慈祖法印嗣于民國丙辰復來甬留住七塔者又數月且開講楞嚴法會庚午法門敦請來續祖席時方駐錫南洋不克來甬凡此文皆未及故謹注于此以誌與七塔關係本末云指南謹注智圓禪師藏真壽塔銘陳寥士師名弘一字智圓譜名普達號了悟別署真常湖南衡陽人俗姓譚父諱香芸母袁氏育子五女二師其少子也師生于清同治十有二年癸酉閏六月四日自幼不食葷饘喜匿就僧人讀書目數行下年十二母氏因難產棄養悲慟逾恒癡心自思如何能免此厄輒用惘惘翌年入衡州吉豐泉肆學業與同學梁交綦篤閱唐傳西遊記香山傳等書心大感動嘆曰欲求長生之道非山深林密虔心修煉安能成就乎嘗與梁窮究其理娓娓不倦每中夜就肆中人熟睡後輒潛起趺坐終年不懈年十五由梁導遊羅漢寺見明果心老和尚如有夙緣告以佛之從弟難陀尊者出家因緣故事即動出家之念潛赴衡山覺海寺披剃為僧彌月之後始被家人偵悉勸令回家越五年復潛往湘陰達摩山依明果心老和尚再度披剃旋至南嶽上封寺從寄禪安老和尚受具戒次年隨度師赴湘陰之神鼎山披閱龍藏並受覺意三昧坐禪方法誦楞嚴諸經始覺前念滅後念生之旨趣越三載餘赴長沙總佛寺晤因靜長老授以瑜伽觀印之法翌年與西竺普悟等同謁九華普陀諸名山旋至四明七塔寺慈運老人見而大器之授以法印留寺中迭任監院知客糾察各職後十餘年鄞之施祥寺方廣寺寶嚴寺寶福寺餘姚之隱雲庵均聘師兼住持之職一意宏法十方稱頌清宣統元年佐戒師寄禪長老創設寗波僧教育會入民國後組織中華佛教總會及鄞慈鎮奉象五縣分會保產興學為之樞導其所設僧氏小學各一所至民國六年邀請諸山會議改為寗波佛教孤兒院選岐昌和尚陳屺懷居士為院長而師總其成又三年任七塔寺方丈建玉佛閣寺之規模益形壯闊任滿回施祥寺復建觀音閣方丈殿淨業堂及兩廊禪房同時任佛教孤兒院常務董事三寶經房經理復就寺中創辦大乘佛學社嗣又改辦明心實業公司製軟蓆草墊出品精美亦濟貧惠工之意也厥後歷任寧波市佛教會鄞縣佛教會及浙江省佛教會主席委員中國佛教會常務委員民國二十一年力與政府交涉收回鄞縣都神殿舊址奠定佛教機關之基礎他如創辦永明小學覺民小學覺民民眾夜校中西醫施診所並建覺民校舍凡百興造不勝條舉度世濟人力之所逮惟恐不赴其勇猛精進有足多者剃徒八法徒十二皆一時龍象二十四年冬營壽塔于鄞東童嶴庾山之巔額曰藏真時年六十有三矣既蕆事屬余為之銘銘曰是為真常大師藏真之塔大慈大悲拯眾生于苦厄昔孔子謂不知老之將至是語也足以銘師之禪德後之人兮過庾山而瞻拜永保其圓覺之宅僧晙老和尚傳溥常僧晙長老籍居湘省郴縣法名宏燦滿清同治年間人也時年二十四歲厭世心切偕堂弟僧晉投覺否大師薙髮福嚴寺受具足戒親近默庵老法師座下為嫡親師公聽講經義有所心得募刊楞嚴易知錄行世祝聖羅漢等諸大名剎充當綱領要職其為人剛正處事嚴厲時號僧晙鉄匠有似南華智昺禪師叢林中人呼名為昺鉄面也自後參訪長江一帶名山大剎朝普陀禮觀音轉來寧波卓錫七塔為慈老人所器重授受心印當時老人一志創造臂助需人及余朝山來此道階法師講唯識論自真和尚代理住持相見如舊相識有知遇之感光緒三十二年余由日本回國過天童留閱藏經亦蒙老人授記諸兄弟輩雍雍肅肅歡聚一堂均以常住為己任會有豪富齋主作福葷食自老見之怒拋棄於地人號之曰火神晙老一見不守清規者舉手便打人稱曰鉄匠不錯七塔規模日加清嚴四方衲子雲遊往來道風於以遠播足與育王天童古剎並峙皆諸兄弟輔治之力林下參學者皆知是寺有鉄匠火神之名也民國七年晙老為七塔主席建造慈祖塔院改修天王殿煥然一新是時見余由南洋回住持事將告退相約同上湖南晙老先去再任岐山仁瑞寺住持於民國十一年五月十九日溘然西逝世壽五十有九築塔於南岳廣濟寺右法嗣二寬明潮江寺住持鉅鏞法王寺住持法孫二能輝回向寺住持新山在本寺剃徒二勛明地藏殿住持道明在祝聖寺法姪寬明於坐談間謂予曰師叔與吾師相交厚今修寺志何不於吾師之行狀發揮片言隻字乎余曰唯自愧年老心弱此亦義所不容辭自余主持是寺以來常以未得鉄匠火神再世為憾追念故舊因濡筆為之傳道亨和尚傳諦聞師宏達其名道亨其字湖南衡陽清泉縣陳氏子也幼習商有異秉喜聞善言尤躭禪悅年弱冠投衡州東一堂智勝寺依真際禪師披薙拾薪汲水侍師頗摯八指頭陀闡毘尼於衡州羅漢寺遂受具焉出堂後往南岳參默庵老法師一見知非凡器教以止觀法門復傳曹溪微旨自後芒鞋竹杖周遊名山遍訪宗匠旋詣七塔親近慈公朝夕參究精進不怠慈公觀其語默動靜迥異尋常因厚遇之授以心印繼在白衣寺僧教育會任要職多年後往天童叩禪機於八指頭陀深有契悟已而被請為該寺綱領要職管理出納者數載洞澈因果秋毫不苟珍視伽藍物如掌珠眾皆敬憚之後返七塔銷假亦被堅邀襄理常住師一日喟然嘆曰所事非本分出家豈為是耶遂辭職回至南岳祝聖寺潛心自修宵旰不輟兢兢以己躬大事為務民國三年被神人雙選任七塔住持內肅清規外嚴佛事增造齋堂雲水堂大寮等建設殊多功績逾恒一時稱為法門特色門下法子一人明校現住持慈谿飯佛寺兼任七塔監院剃徒一人圓成現任七塔客堂要職皆富于參學為法門所器重者民國七年師圓寂於七塔寺瘞靈骨於天童青龍崗冷香塔院云常西上人傳陳寥士上人諱常西法名宏宗字真如湖南衡陽人俗姓劉幼具異稟夙根未昧年十九詣衡山南峯寺出家師事妙相禪師旋受具戒于南嶽祝聖寺時默庵法師為教授獨器重之令任職寺中既住衡陽羅漢寺復遊粵東白雲山宏襄佛事所至有建樹光緒甲辰浮海至普陀山禮觀音大士抵鄞留七塔寺受慈運長老心印為報恩堂第四十二支正宗其隨默庵法師住大善寺也勞績最著民國初元遂被推為住持既滿任與道階法師朝五台留舊都法源寺未幾南返仍拄錫七塔歲癸亥任住持三年後退居虔心淨土日誦佛號五六萬聲旦夕頂禮十餘年如一日以民國二十五年丙子十二月十三日端坐圓寂世壽六十有九僧臘五十焚化後瘞骨於庾山嶺普同塔法徒戒恆等九人贊曰自白馬馱經佛教東漸薪火緜延代有名德迄至輓近沙門人數之眾以江浙為首屈而浙東名剎號稱尤盛七塔慈祖蔚然為中興巨擘座下高僧法脈宏展常西上人其一也壯歲輪蹄南北投老苦行虔修其枯澹純美卓然為浮屠氏表率有足多者余經世多憂患常詣上人證禪理忽忽得懸解別幾何時竟以寂滅聞執筆悽然次其行藏傳于世圓瑛法師事略王浩然法師諱宏悟號鞱光原籍福建古田吳氏子其母禱觀音大士而生生時室有祥光自幼聰穎非常鄉黨目為神童十九歲棄儒學佛二十歲依鼓山湧泉寺妙蓮地華律師受具足戒二十四歲參常州天寗寺冶開長老有省偈云狂心歇處幻身融內外根塵色即空洞澈靈明無罣礙千差萬別一時通二十六歲參明州天童寺寄禪敬安師禪師甚器之二十八歲嗣七塔報恩禪寺慈運靈慧老人法三十一歲開座講經三十二歲住持鄞縣接待寺重興古剎民國光復後涉俗利生創辦寧波佛教孤兒院泉州開元慈兒院重興開元寺福州法海寺住持閩侯縣大雪峯寺林陽寺鄞縣七塔報恩禪寺天童宏法禪寺時以國家內憂外侮惄然憂之有聯云出世猶垂憂國淚居山恒作感時詩民國十九年佛教多難發起組織中國佛教會主持會務六載講經海內外垂三十載著述宏富有圓瑛法彙經論講義十餘部行世緇素多沾法益有國府林子超主席戴季陶院長林璧予部長張詠霓部長各要人為之序並有一吼堂詩集恒以詩說法善能啟發人心浩然為法師信徒見聞所及略記於是送圓瑛法師主持報恩禪寺法席序楊樹莊夫學佛乃豪傑所為出家本丈夫之事若非久培德本宿具靈根豈易擺脫紅塵誕登白社耶爰有圓瑛大和尚者法門龍象也幼懷貞敏學富五車長悟妙明智通三藏到處隨機施化一朝乘願再來以堅固心宏法南洋羣島出廣長舌談經北部燕京宗說雙通緇素競仰本我佛慈悲妙行創孤兒院寧波佛教孤兒院福建泉州開元慈兒院而教養兼施念先哲建設苦衷興僧伽藍重興鄞縣接待寺閩開元寺法海寺而禪講並重吹無孔笛彈沒絃琴棒喝森嚴於開口不得處說法機鋒迅捷於下手不得處施為接引宗徒提攜學者法緣溥洽道化崇隆和尚其出家之雄乎故能運慈悲佐定慧如來以闡教利生也邇者人神雙選龍天推出為七塔主人續報恩法脈將見高提祖印振刷佛教精神大展宗猷為作人天眼目即請圓瑛大和尚喝正蓋聞具一切智如來所以稱尊得三摩提菩薩故能入世智悲並運真俗等觀為巨夜之明燈作迷津之寶筏至矣哉佛教之有裨於世道人心也或謂近於消極但求出世此實未達深源詎為確論夫釋迦闡平等慈悲學說人我一如視大地眾生皆如一己亡身救世捨己利他如地藏云眾生度盡方證菩提其積極為何如耶即質之革命主義曰犧牲個人者即捨己利也曰益羣眾者即利他也則佛教又何嘗不適合於潮流惟在乎善用與不善用耳如我圓瑛大法師應機示現乘願再來丱歲窮經志綜百家之學華年入道心超六欲之天撥草瞻風擔囊負缽初參本來面目洞明直指之宗次研圓頓教乘復得見月之益由是建法幢於處處破疑網於重重宏法為懷利生不倦創恤孤之院泉甬諸孤賴其生成設療病之局閩侯貧病蒙其救濟曩者太白爭迎去歲雪峯公聘其道學感人之深有如此也東津七塔報恩禪寺為法師得法祖庭前則公舉住持時在南洋講經力辭不赴此次時機既熟人神雙選羣情慰悅四眾懽騰鈞等誼關桑梓有不能已於言者乃為頌曰得正法眼主梵王宮衲子雲集萬派朝東頻施棒喝啟瞶發聾心燈續燄丕振宗風圓瑛大法師榮任七塔寺方丈誌慶髮弟陳鈞王建三辜耀德陳伯臣章銜青丁則餘許道生陳錸歐陽軫蔡維符仝謹頌溥常老和尚七秩大壽序曹作昭無泥則通有泥則塞通則不凝滯於物而能壽世壽民晉釋惠遠集緇素百二十有三人結白蓮社其間譽望尤著者如劉遺民周續之等為當世推重號社中十八高賢所謂墨名而儒行者非與晉謝靈運才學為江左冠而負才傲物少所推挹一見惠遠遽改容致敬所謂儒名而墨行者非與求其不泥於儒不泥於墨通儒與釋為一貫上下與天地同流可以養生可以延年者於浮屠中得一異人焉釋子溥常原籍湖南湘鄉人士父武庠生森蔚公曾在台灣統兵陣亡母羅氏有子桂秋早夭世居邑南之西亨湖洲里本曹氏子與作同出大高祖殷也公之來孫也年少參禪離鄉遠遊四十餘年際古稀時垂念先人邱墓扶杖南旋家嚴原少同里居長同學遊唔談時均鬚髮頒白兩不相識杜工部詩云乍見翻疑夢相悲各問年者可作二老註脚也小住旬日邀家嚴周覽鄰封名勝幾遍苦心孤詣卜定乃祖乃親宅兆皆厚封而銘誌之不遺餘力旋奉先人栗主入族祠享祀族中親而困窮者溫恤之老而賢明者分潤之不少吝生妻下堂已垂老矣呼來話舊饋贈多金俾終餘年凡茲行誼揆古來仁人孝子何以加焉世俗每稱佛門中棄而君臣去而父子禁而相生相養之道今釋子反此較墨名而儒行者有過之無不及也蓋通則仁仁則親親親仁民所自來也其獲高年享遐齡而康寧考終可左券操也總之不出乎尼山氏所謂仁者壽近是且觀其所著華嚴綱要淺說一書主辦報恩佛學院運慈悲心伸妙手眼純是一片救世婆心更觀其出家行脚參訪善知識金山高旻諸大名剎等及充毘盧寺住持坐香傳戒講經親近赤山法老人講楞伽受聘揚州僧學校及湖北蓮溪等處血筆汗文婆心熱語不分疆域因才而教子輿氏稱教人以善謂之忠者亶其然乎亶其然乎再觀其與同志月霞法師留學生桂伯華君往日本講經考察各國宗教異同游歷南洋羣島朝覲大金佛塔雲南僧界虛雲長老等邀請組織佛教滇藏支部開辦學校與演說團省會笻竹大理觀音二次傳戒最後主席寧波七塔報恩禪寺發起禪堂坐香亦講經傳戒不論中華異域有教無類韓子曰知而不以告人者不仁也告而不以實者不信也又曰孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之釋子教本多術推諸先聖後賢若合符節假令韓子而在不惟不闢之不以為嚴師必以為畏友也噫謝康樂自命曰成道須慧業文人非虛語也作見釋子能於同分源流人易世疏之中獨念厥初愧無話言贈貽憶先祖銀潢公贈瘦虎上人詩有句云不為書所囿未必佛能纏今釋子事理通達如此作不能道其萬一茲際七旬大壽慶典宏闡毗尼四眾弟子中西賢流稱詞滿院謹隨諸君子後持此二語為心香之祝俾如岡陵山阜云爾是為序中華民國二十三年歲次甲戌孟冬月俗家弟曹作昭籌增氏謹撰溥常老法師七秩大慶傳戒記學僧了達原夫我佛之垂化也道濟百靈慈育萬有故法說四十九年經談三百餘會法門無量教義重要以宏道利物為旨歸耳而其修習次第則以三學為要素三學者戒定慧是也由戒而定而慧則道無不宏物無不利矣戒者何防非止惡之義也定者何息慮靜緣之義也慧者何破惑斷疑之義也此三者實入道之門戶成佛之關要也而三者之中尤以戒為最要此世尊之所以始自鹿苑終至鶴林諄諄教誡叮嚀咐囑者也吾國初無傳戒之說至唐麟德二年勅命道宣律師於淨業寺開壇說戒利樂羣黎而傳戒之名於是乎始焉其後海內叢林繼起效法大闡戒旨至今益盛然一觀其傳戒日期或一月兩月者有之十日八日者有之但無論期之長短時之暫久惟然香之日必依佛誕良辰其揆一也考其然香之意所以本藥王菩薩焚身供佛之誠而表己之誠敬也故當春夏傳戒然香者必在四月初八釋迦誕日秋季傳戒然香者必在九月三十藥師誕日冬季傳戒然香者必在冬月十七彌陀誕日茲我七塔擇期臘八傳戒然香者良有以也余曾考七塔寺自中興慈祖老和尚於光緒丙申丙午兩次傳授大戒後迄今幾三十年不復舉行傳戒之盛典矣民國甲戌之秋本寺檀越戴氏皈依三寶篤信佛法覩七塔之宗風欣然生慕瞻溥公之道範油然起敬於是樂施鉅金倡演毗尼恭祝溥公七旬大慶藉以廣種福田普利人天溥公見其供佛心殷為法心切義不容辭允其所請始備報單通告四方凡有發心來寺求戒者無論緇素免納戒費並成就三衣鉢具於是求戒之四眾弟子紛至沓來雲水之大德高僧源源不絕偌大叢林幾有人滿之患齋堂宿舍遂成問題特將齋堂前之階道與大寮後之空屋改作臨時齋堂又將土木工匠之臥室及佛學院講堂寢室概作求戒四眾之宿舍迨至冬月一日開堂延請普陀後寺住持學老和尚為正訓覺梵諸師等為副訓從此每日領導新戒演毗尼教儀規出恭入敬威儀整肅井井有條見者無不歡喜讚嘆並請智圓老和尚為羯磨阿闍黎圓瑛老法師為教授阿闍黎念六日三師臨壇傳授沙彌淨戒是日銀燈玉燭燦爛輝煌奇香異花微妙清潔而三師之圓音妙味無窮有如靈山一會儼然未散誠盛舉矣次日五觀堂內乞戒弟子習食鉢飯善信男女前來參觀者人山人海頗形熱鬧臘月三日請三師及七證阿闍黎在法堂用十師齋旋於三聖殿內禮請十師陞座傳說比丘大戒四壁懸掛滿堂佛像陳列各種法物種種莊嚴眩目賞心初六初七兩夜然香供佛是時新戒六百餘人胡跪合掌仰對佛前無不誠誠懇懇一心稱念南無本師釋迦牟尼佛懺悔業障希增福慧次晨又請三師上壇說圓滿菩薩大戒畢即齊詣觀堂應供食七寶五味之粥即俗所謂臘八粥是也至此三聚淨戒於以演畢一場勝會告一段落回憶開戒期間歷時數旬雖在隆冬之際而天色清朗氣候溫和似乎天其有意助此勝緣也全寺僧眾計有千餘護法男女數百人而內外安寧上下和睦苟非溥公道行高隆曷克臻此羯磨教授尊證開堂諸大德皆屬當代高僧一時上座咸能惠然蒞臨輔佐法會豈非溥公之德不孤必有鄰者耶竊以本寺二十餘年來未經傳戒一旦場開選佛大闡毗尼匪特七塔宗風為之一振即甬江之佛化增添無限光彩余於是喜而為之記以志不忘云溥常長老事略陳寥士溥常長老法名宏鉌別字夢忍行者湖南人也俗姓曹母羅氏自髫齡即常曰為僧不易南面王樂父森蔚公怒之欲淹諸池中問其尚欲為僧否鄰家為之緩頰曰其速立誓不做可貸死終不肯一言年十五患眼疾父命疏諸觀音像前許愿喫齋持之甚虔夜夢近葷食即驚覺悔恨狀魁梧出語往往有哲理因有神童之稱年十七隨父應童子試文武兼考府試得㑺院試時父因替其名得中武庠生先是父已取列第五及榜發落第適學使逝世其中玄虛不可問矣其父夙精韜略為國効命清光緒癸未陣亡于台灣基隆之役師既痛父喪又憤國難丙戌赴閩投軍以繼先人之志而中法議和荏苒數年用武無地乃復動出世之念投鼓山薙度時年二十有七也翌年受具喜研雲棲法彙私淑蓮池老人循誦西方願文力行不渝因東包行脚訪善知識東南名剎次弟參謁壬寅親炙金陵赤山法忍老人老人為當代禪門宗匠開示永明四料簡遂悟禪淨雙修之旨從游終南山于翠微寺基結茅禮佛大興善寺坐香打七徧歷香山五台轉舊都下江寧甲辰任金陵毘盧寺監院己巳赤山法忍老人示寂遺言命師與月霞法師繼老人講席闡揚楞伽筆記聽者歡喜受持丙午主講楞嚴于揚州天寧寺普通僧學堂及湖北蓮溪寺由是無歲不有講經之會未幾渡日講演楞伽扶桑人士莫不悅服歸國後應天童寄禪長老天台諦閑講主及江寧李梅庵方伯之請住持毘盧寺聲教日宏民初應虛雲和尚之邀卓錫滇中五六載創辦僧校立佛教滇藏支部大理之觀音省會之笻竹兩次傳戒旋以檳榔嶼極樂寺本忠和尚之約遊南洋羣島覲仰光大金塔至歲戊午回甬上七塔寺屏絕外緣禁足靜修凡六載甲子日本震災紀念會我國代表孔雲生請師再度東渡弘法師率法侶三十餘人抵東京日僧團歡迎于淺草金龍山會于災區觀音殿前師見昔日殿前紙燈一對依然高懸島民稱異我僑胞亦均目擊之師讚嘆說偈曰金龍淺草劫火洞天寺像靈爽如在梵天會畢返七塔戊辰主辦七塔報恩佛學院兼講華嚴仰體蓮池老人遺訓洞徹毗盧性海為進修歸宿彌陀淨土而日以穩健三年圓滿夫華嚴大經釋之者惟棗柏李長者之合論清涼觀國師之疏鈔高義玄旨貫通不易師為啟示學人汲引後覺掬其綱要撰作淺說民國十八年雙十之節適值己巳重九正講賢首品時會主文殊名妙吉祥而院中吉祥草忽開花呈瑞天然感應嘆為希有復三年回湘修治故塋奉先人栗主入祠孝思不匱佛所許也癸酉公推為七塔主席甲戌開堂傳戒會者千六七百人得戒者僧俗六百有奇法席之盛號稱空前法徒攸久等十三人剃徒淳清等八人乙亥師以纂輯寺志見屬丈室麈談因得聞其行誼而次其大略如上指南和尚述略無住和尚法名戒利字指南湖南邵陽李氏子父濬生有儒行師幼穎悟而多病依父讀父憐之嘗寬其讀師昆弟七人伯兄中歲出家道行高潔歸覲時師輒就兄詢出世法大樂之清嘉道間邵陽多樸學之儒咸同朝士多以武功顯父語以鄉先輩之所為師曰世相無常人生難得安用逐世俗虛名浮利乎年十七父母將為之完婚師跪辭遂詣本邑福壽庵禮志高上人求披薙其冬受具足戒於毗盧寺旋詣點石庵依尊美和尚尊公禪宗老宿曾得桶底脫落者湘中耆宿皆推重之師依住二年於本分事多所啟悟又從指月老人受經論歷參祝聖無凡高安兩上人詣衡州西禪寺聽耳西法師講楞嚴於是禪教皆有根底宣統元年己酉歲以朝海來甬遂留七塔歷事慈運老人及岐昌法師皆任以要職凡住七塔者八年與僧晉首座有緣得傳法印鄞南看經寺者古名剎也久頹廢請師住持師以全力重興前後役款鉅萬凡一瓦一石必使位置安好故看經今有彌勒樓閣之稱師戒律精嚴行持卓越曾朝禮四大名山遍參宗匠而於培養人才出自天性後進志學者皆獨力資助之所成就者多佛門法器法徒五人剃度徒一人皆分別遣之求學或遠至數千里外所費歲甚巨師無少惜民國念五年冬繼溥常和尚為七塔主持七塔舊有報恩佛學院以款絀故常從簡略師喟然歎曰佛法之盛衰關於教育之得失今何世也而可以簡略誤青年乎遂一切詳悉考慮變更整理之或以支絀為言師毅然以籌款自任學僧聞風自遠方雲集者接踵師預計三年中將重修大殿創造延壽堂改造學院蓋欲以經營看經之心力移之七塔也其志願可謂宏矣師為人慷慨有大略凡舉事必期於成有困難者雖千金貸之不復追問而局度雍容虛懷善下尤為圓領中所僅見云報恩堂宗譜序圓瑛夫拈花一笑妙契佛心面壁九年高提祖印不立語言文字教外別傳直接上根利智當下頓證由是一花現瑞五葉流芳宗風振丕於中華法乳遠注於臨濟而我七塔報恩禪寺傳臨濟正宗第三十九世先師慈運老和尚從光緒十六年入寺中興甫拾稔而叢林之規模全具傳法四十八人或主持法席多皆為匠為師或分化諸方到處宏宗宏教法門既廣須溯流源宗譜未成莫知系統何幸而有溥常法兄不惜精神發心登記編成宗譜印發執持俾同系共仰祖庭常住盡明支派本寺既定為法門選賢叢林而宗譜為不可少之事茲既編成囑余為序祇得略敍緣起如此民國二十四年春報恩退隱圓瑛宏悟謹序報恩堂宗譜序智圓夫日星之光俱麗天上江河之水同歸海中是故樹大分枝終不離乎根本人多分派當勿亡其法源而我七塔報恩寺創始於唐代心鏡禪師初名東津禪院繼號棲心禪寺宋祥符元年復賜額崇壽明洪武年間又更名補陀歷千數百年興衰靡一廢而復舉者不知凡幾迨至清季光緒十六年我師慈運老人授住以來力圖建設百廢俱舉並親詣都中請頒龍藏蒙恩賜額報恩禪寺自此規模宏偉足增東浙之美宗風遠播悉種西方之因法門鼎盛甲於諸方衣鉢傳繼已達四十八人子孫蕃衍實逾數千百眾散處他方各興法席道德之隆替不一人物之代謝孰稽若無正當之系統難期永久之榮譽此固宗譜之待修實有不容稍緩也今者本寺住持溥常法兄道行高遠學業宏富歷主諸方法席久為法門欽戴因有鑒於斯乃毅然興起集法眾而會議行登記之方法歷時既久始告成功復立法規以杜流弊俾後進之賢者有所依據而邪疵放癖之徒勿容混跡斯誠法門之善舉也余喜本寺宗譜之成立復感溥兄之偉德爰不揣鄙陋略敍數語以紀其大概云爾民國二十四年春月智圓宏一謹述報恩堂宗譜緒言溥常溯吾教主釋迦牟尼佛應機示現誕生西域十九出家三十成道始從鹿野苑終至跋提河經歷四十九年演說十二分教隨根利導頓漸兼收迨至法華普與授記極暢本懷復於靈山會上拈花示眾迦葉尊者領悟心宗傳持正法眼藏為西天第一祖直至二十八代菩提達摩大師航海而來宏揚教外別傳之旨不立語言文字直指人心見性成佛以為東土第一祖名曰宗門傳至六世而有曹溪大鑑惠能禪師其法特盛分為兩支其一青原行思思傳石頭希遷遷傳天皇道悟悟傳龍潭崇信信傳德山宣鑑鑑傳雪峯義存存傳雲門匡真文偃禪師為雲門宗玄沙師備為偃同門友傳地藏桂琛琛傳清涼法眼文益禪師為法眼宗遷之支出藥山惟儼儼傳雲巖曇晟晟傳洞山良价价傳曹山本寂為曹洞宗其二南嶽懷讓讓傳江西馬祖道一一傳百丈懷海海傳黃檗希運運傳臨濟慧照義玄禪師法運更昌為臨濟第一代祖海之支出溈山靈佑佑傳仰山本寂父唱子和為溈仰宗以上自曹溪而來宗門為五家派別茲浙江鄞縣江東七塔報恩禪寺嫡傳臨濟正宗自臨濟初祖第一世傳至三十世明州天童密雲悟禪師傳林野奇祖為第三十一世述法派偈行大源遠等十二句傳至三十九世我先師慈運慧老人為本寺中興光緒間進北京請藏經賜寺額名報恩禪寺自此報恩堂上傳宏字四十八支法嗣各各宏化一方分燈續燄綿綿不已而報恩祖庭留名登記為不可少之事因立報恩堂宗譜百丈云見與師齊減師半德見過於師方堪傳授斯時也法道垂秋人心不古其或趨向偏邪師徒授受難免有混亂法門處不得已於民國二十三年夏正十月初六日慈祖誕辰召集諸法門成立宗譜登記議決法規杜絕流弊令後之賢者遵守毋忽特述顛末云爾報恩堂法規第一條報恩堂上嫡傳臨濟正宗由天童分派遞傳第三十八世雲龍堂上普洽皓祖承嗣而來第二條凡求法者師徒授受以心印心相敬相愛尊崇道德節義始終誠信不二經云信為道源功德母長養一切諸善根第三條凡求法者既付與法卷當索取報恩堂法規一卷俾知法派源流慎重保留敬遵祖規第四條凡受法者當向祖庭登記於中興慈祖像前上供設如意菜通白大眾豐嗇隨便不可缺少至若辦齋幾筵費用太重有心發心結緣亦不妨隨喜第五條或有遠方他處授受者須請代表寄上如意菜上供等費及四寸小照片寫明通訊處請方丈登記付給報恩堂法規一卷當保留敬重以為憑證第六條既得本堂法卷不敬師尊再行轉拜本堂法親擅自收錄紊亂秩序失信生嫌授者受者悉皆開除法籍第七條得法後有不守清規違犯國法者各自承當與法門無涉倘受刑事處分應由法門審察從嚴辦理第八條凡有侮慢本師及法派尊長等當報告方丈召集法門秉公理處輕則議罰重則開除法籍第九條法門一家發生細故誤會者當請公正法長勸解調停無傷和氣或有恃强欺壓良善者各法長當合力援助第十條法眷中有被外界欺侮侵害者審其事實情理尊崇公正當為援助而保護之藉此團結保障法規第十一條本寺方丈召集法門公選凡入門者均有選舉被選舉之權倘有品行不端亦得公議而停止之第十二條凡法門中有隨時發生弊端損壞祖庭名譽得由方丈召集法門公同決議而處分之第十三條本法規於民國二十三年古歷十月初六日慈祖誕辰成立宗譜全體通過發生効力如有未盡事宜得由法門會議增改之以上法規各宜慎重中華民國二十三年國歷十一月十二日古歷十月初六日公布實行第代法嗣謹遵民國年國歷月日古歷月日給歷任住持年表慈運長老于清光緒十六年入院是為中興第一代寺務之設施與策劃悉躬任之住持一職則由法子代理迄至宣統二年長老圓寂嗣後住持之地位始真除矣清光緒十六年本來清光緒十七年本來清光緒十八年一禪清光緒十九年一禪清光緒二十年一禪清光緒二十一年達光清光緒二十二年達光清光緒二十三年達光清光緒二十四年本來清光緒二十五年賢兆清光緒二十六年賢兆清光緒二十七年賢兆清光緒二十八年蓬萊清光緒二十九年蓬萊清光緒三十年蓬萊清光緒三十一年自真清光緒三十二年自真清光緒三十三年自真清光緒三十四年行規在位八天圓寂谷葊清宣統元年谷葊清宣統二年谷葊以上均代理住持清宣統三年岐昌民國元年岐昌民國二年岐昌民國三年道亨民國四年道亨民國五年道亨民國六年僧晙民國七年僧晙民國八年僧晙民國九年智圓民國十年智圓民國十一年智圓民國十二年常西民國十三年常西民國十四年常西民國十五年覺圓民國十六年覺圓民國十七年覺圓民國十八年圓瑛四月上任民國十九年圓瑛冬月改就天童寺方丈選舉本舟繼任民國二十年本舟民國二十一年本舟民國二十二年本舟民國二十三年溥常民國二十四年溥常民國二十五年溥常民國二十六年指南附記宗譜源流詳記各法眷年籍出家受具授記事略唱滅法嗣七項已成七塔報恩寺宗譜一書是卷則略其表系而重于文字可互相印證也
