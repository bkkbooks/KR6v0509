body:
  text: 七塔寺位於浙江鄞縣寧波市東五里南海之北與延慶阿育王天童並峙稱四明四大叢林寺始創於唐大中十二年八五八時有分寧令任景求者捨宅為寺號東津禪院敦請心鏡奐禪師居之卽本寺開山第一代也心鏡奐禪師原主天童寺咸通元年八六浙東剡寇裘甫掠奪四明縱兵晝入心鏡晏坐禪定神色不動賊衆驚愕作禮而退明年八六一郡紳奏請改名棲心寺以旌其德焉宋大中祥符元年一八賜額崇壽寺明洪武二十年一三八七因南海梅岺山寶陀寺懸於海邊乃徙建於本寺空地奏請改棲心為補陀寺故寧俗尚有本寺卽南海普陀之說永樂年間僧寺俱廢旋復建棲心寺明永樂宣德天順三朝各有增建淸初順治康熙兩朝亦各有營修咸豐十一年一八六一寺殿悉遭兵燬迨光緒十六年一八九慈運慧禪師為主席辛苦經營大力復建殿宇閱三十餘載始竣事漸復淸初之舊觀是為本寺中興第一代復於光緒二十一年一八九五進京請領龍藏并勒賜寺額報恩寺以康熙時建七浮圖於寺前俗人乃呼為七塔寺本寺全稱為七塔報恩禪寺者以此民國以還傳戒講經設藏經樓立佛學院大振臨濟宗風民國二十四年一九三五溥常長老倩陳寥士居士纂修寺志博引旁徵成志八卷分門為八圖記金石沿革建置僧譜法要產業藝文書前有題辭五篇序九家圖像七幅後附以補正寺之建置沿革分記於圖記沿革與建置三門佛教文獻則分編於金石僧譜與法要三門收羅弘富可與天童寺志並列矣茲據民國二十六年一九三七排印本景印七塔寺志題辭泱泱海水杳杳蒼穹巍巍七塔兀兀靈鍾東津禪院肇唐大中初祖心鏡拈花正宗威鎮毒蟒德感神龍入那伽定剡寇潛鋒崇壽題額補陀鳩工宋元逮明興廢重重迭經刦火紺宇塵封迄於清季法運再隆中興慈祖略偉圖宏高建法幢式煥金容五百羅漢鎮山之雄奏請龍藏募鑄大鐘彌陀寶殿萬緣喜同百廢俱舉羣材集中頡頏育王媲美觀宗輝揚雪竇法流天童燈燈續焰繼紹芳蹤化被四明名聞崆峒弈弈靈光今推溥公誕降湘南卓錫甬東戒壇法座華雨漫空臺瀛緬印十方雲從凡茲盛業宜標管彤不有寺志曷垂無窮仗斯眾擎成其大功披圖按冊指掌羅胸勒之金石昭示纖洪藏之名山垂跡梵宮播之藝文江筆花濃按之譜牒支派衍通傳鐙光遠壽世文鴻萬禩千秋丕振宗風粵東許聖妙次水月上人感懷原韵題七塔寺志勤磨古鏡發新明幻作人寰一化城盡導迷流歸覺海更憑仙筆助文情廢興舊事殷殷記緇素遺聞細細評珍重甬東留七塔天童雪竇共長庚丙子初夏雪竇山人太虛七塔寺志讚南海之北甬江之東寺名七塔始唐大中觀宗延慶育王天童名藍楚楚並峙稱雄觀音徙跡臨濟遺風弘宗演教與藥施功憐斯病苦導彼羣蒙虛空有盡厥志無窮丙子夏觀宗弘法沙門寶靜題七塔報恩寺志並贈溥常上人忍將歲月任蹉跎蒿目中原感慨多救國無能慚學子潔身有意羨頭陀入山漸覺塵心澹出世方知壯志磨咫尺浮圖憑寄托甬東勝跡博君呵夢麟金鼎羅漢五百浮屠七佛法無邊信唯一聲教功教兩可傳寥士作志寫其實寥士先生纂七墖寺志原題梁寒操七塔報恩寺志序七塔報恩寺初名東津禪院建於唐大中十二年迄今已歷千有七十餘年矣住持溥常上人以佛事不可不傳故囑陳寥士居士作志以傳之舉凡寺之如何創立如何中興以及歷代古德之言行莫不詳載靡遺俾後之讀者能有所則效余讀此志於其歷代古德中得可師可法者兩人焉曰心鏡禪師曰慈運禪師心鏡禪師唐代人咸通元年有寇入寺欲加以焚掠師方宴坐入定不驚不怖寇異之作禮而退寺賴以全夫眾生之所以輪廻六道不得止息者心動故也欲息輪廻必須先息動心欲息動心則非禪定不為功師能精修禪定獲證三昧宜其為刀兵水火之所不能驚危急存亡之所不能動也慈運禪師清朝人光緒庚寅入主是寺知佛法非多聞薰習不能悟入乃赴都請得大藏經藏之於寺寺遂改稱報恩寺自是而後學人乃得從聞而思從思而修不至空腹高心盲修瞎練寺之得以中興者慈運禪師之力也此二禪師非特於寺為難能可貴抑亦佛法東漸以來所不可多遘者也余之得知有此二師使余能有所則效者寥士居士作志之功德也噫寥士居士之功德不朽矣寥士居士之功德不朽亦溥常上人之功德不朽也是為序民國二十五年丙子冬豫章梅光羲七塔寺志序今何時乎天地晦冥賢人否塞百無可述倫紀盪然惟有一事差强人意者則邦國志乘地方文獻遠紹旁搜規撫百緒鉤沈彙逸盪鬱千芳如各處縣志寺志之修輯皆其例也吾友陳子寥士蓄其精銳若朝氣之奔騰遭厥蹇屯類夜郎之流放夙好丹鉛雅耽禪悅久更憂患彌多述作邇徇溥常上人之請有七塔寺志之作吉光片羽莫非異珍暮磬晨鐘皆成逸響識梵宮之掌故貝葉頻翻聽滄海之潮音天花初散摩挲唐塔枯劫未湮供養湘珉傳燈無恙稱小補陀記華鬘之色界宣大乘教著衣鉢之聲聞三千大千佛光永被一塵一剎慧業純昌誦般若之經迹符南海續伽藍之記紙貴洛陽七塔之影頡䀪俯臨佛地四明之山崒嵂遙接禪天斯寺也在唐曰棲心在宋曰崇壽在明曰補陀在清曰報恩一脉綿延香火未絕十方稱讚聖善頻生名德高僧發揚光大棒喝拈花各參體要而鉤稽沿革夷考源流不有志書無以傳信可謂壽世之作抗手古人按圖而遊盟心息壤者矣是為序民國二十五年三月蕭山朱鼎煦七塔報恩寺志序寺之有志猶家之有乘國之有史也甬江之東七塔報恩寺為唐大中戊寅分寧宰任公景求捨宅所建初名東津禪院嗣改棲心寺迄今已歷千有十九年矣余顧未嘗一履其地然余之親教師圓瑛法師為余言之綦詳寺之開山祖師號心鏡禪師其推為中興第一代者則為慈運大師圓瑛法師其弟子也清光緒庚寅大師徇江東紳耆之請入主是寺適值凋敝之餘佛殿僧寮悉燬於紅羊劫火大師具大願力慘淡經營重建大雄殿三聖殿天王殿玉佛閣華嚴閣藏經樓雲水堂及寮舍等三十餘所規模莊嚴燦然大備乙未入都請領龍藏始蒙勅賜今名曰七塔報恩寺先是大師受事伊始即開海單以安眾常住三百餘僧念佛坐香雙修禪淨大眾中得領導而悟入第一義諦者頗不乏人宣統庚戌大師示寂法門弟子次第相承繼往開來綿宗風於不墜是亦煅凡煉聖得曹溪一脈之真傳者民國二十四年乙亥冬溥常長老慮及歷代祖師之言行堪為緇素模範者向無紀錄人多忘之因以纂述寺志為急務倩陳寥士居士董其役又得圓瑛智圓諦聞三法師暨胡蒙子趙百辛王宇高黃夢度王玄冰諸居士襄助博引旁徵爬羅剔抉殫精竭慮而後成志凡八卷以圖記金石沿革建置僧譜法要產業藝文分類洪纖畢舉朗若列眉以史乘之體例闡佛法之高深俾後之讀者不啻聞廣長舌之說法矣是為序中華民國二十五年歲次丙子仲冬月皈依三寶弟子王淮琛謹撰七塔寺志序粵稽吾國之有志乘肇源於晉之乘楚之檮杌魯之春秋由來舊矣降及近代凡屬名山大剎亦皆風起雲湧燦然大備誠以志乘之關係於史地人文者至鉅而未可或缺也鄞縣七塔禪寺開山於唐迄今千有餘載文物彬彬古蹟歷歷殿廡禪室既宏既麗佛制清規亦嚴亦整堪為一方之名勝然則往事舊聞水源木本詎可略而不著使後之人無所考哉溥常長老初膺七塔主席即建纂志之議周折幾經竟觀厥成所有古蹟法物文藝建置等可以藏之名山垂之不朽者均在搜編之列科分類別細大不捐藉紹前猷用規來軫洵七塔之宏圖佛教之壯觀也謹序民國丙子滇南夢夢道人諦聞書於報恩佛學院教務室鄞縣七塔寺志序寧波舊稱佛地鄞縣附郭一隅寺庵以千計今存者猶七百餘焉四鄉之寺以天童育王為稱首縣治之寺以七塔觀宗為稱首二寺皆盛於民國以來而觀宗尤後起七塔之為寺唐時號東津禪院厥後其名屢更曰七塔報恩者自慈運慧祖得名也光緒初祖至七塔年已六十有三中興之功志載略備法派之盛共得四十有八人而岐昌法師為之巨擘焉慧祖示寂歧昌法師紹隆其業以大以充遂有今日之崇奐今四十八支之法派雖各有屈伸增減而乳流益蕃住持三歲一易人皆以法派充之大抵以維持常住為己責七塔之興蓋未有艾也前住持溥常老和尚以龍象力作人天師於全寺規模既整既飭乃喟然歎曰寺之有志猶國之有史也二典以前茫昧無稽司馬遷不作史記則伏羲以至漢武事將不存而後人亦無從效法自大法東來古剎名藍輒歷千年而不廢視有國者孰與長短而卓絕瓌異之行往往傑出其間不有紀述將如浮雲之過眼雖千奇萬變有不能道其髣髴者矣吾滋懼焉乃屬其事於陳君閱數月而畢事書成徵序無住以為溥公之言足以示後遂次其語以告夫千百世之居是寺者使知夫古剎之宜保中興之烈不可忘其必有繼起而光大之倍蓰於今日者乎此序民國丙子冬不緇頭陀無住謹序於報恩佛學院教授室七塔報恩禪寺志序甬江之東有古剎焉始自唐大中十二年戊寅為民國紀元前一千零五十四年分寧宰任景求捨宅為東津禪院敦請心鏡禪師居之師住天童曾有徙神龍鎮毒蟒之神異至是咸通元年庚辰民國前一千零五十二年會剡寇裘甫擄劫四明縱兵晝入師宴坐禪定神色不動寇眾驚悸作禮而退明年辛巳郡紳奏旌師德請以棲心名寺是為本寺創建之始宋大中祥苻元年戊申民元前九百零四年賜額崇壽明洪武二十年丁卯民元前五百二十五年昌國寶陀寺內徙奏請改棲心為補陀寺清光緒二十一年乙未民元前十七年住持慈運老和尚請藏經改寺額名報恩以門外向有七浮圖俗呼七塔而七塔報恩禪寺之名由此始民國二十一年壬申之夏寧波防守區成立暫假該寺辦公余住居是寺一年乃遷寺有溥常長老一頭陀行之德行僧也講經遠及日本闡化行於緬滇束包行脚遊遍國中余固留心訪道乃咫尺竟等天涯意者機緣未熟無感故不應耳蓋其時余於簿書之暇正從事編集佛學借鏡一書未遑參問迨二十三年甲戌春全書告成欲求有道而就正之適長老於是年任該寺主席大樹法幢合十座下相見恨晚荷蒙幾經審查并為之序四月八日釋迦聖誕余與內子禪心即於是日䖍誠皈依因緣時會蓋非偶然也長老乘大願船泛般若海以濟度為心開堂傳戒復興禪那雖年逾古稀而宏法之志願彌篤尤拳拳於首創寺志彙編佛史以完其未竟之志惟時以精力不逮主持乏人為憾余不自度量慨允佛史彙編寺志又有邑人陳寥士居士担任有志者事竟成非長老之大願力曷克臻此茲幸寺志付印而余之佛史編年統紀亦近殺青因略述其因緣而為之序中華民國二十五年佛生二千九百六十三年公元一千九百三十六年丙子春夢度居士江寧黃煃元謹撰七塔寺志序道本無言以文言而通載事興易謝必紀籍以流傳故凡先賢往行當世規範以及地址形勝有可紀錄者皆當銘諸簡牘而昭垂久遠有所遵循夫道也者體空而用繁體空則慮絕思亡不可擬議用繁則穿衣吃飯資生事業罔有一法而能例外故曰二諦雙融真俗一如所以上堂秉拂說法譚禪理也真諦也遊興紀載清規法則事也俗諦也合之同一體也俱為要端故不可以不紀四明山輝川媚人物薈萃之地剎竿相望稱為東南佛國大江之東有七塔報恩寺開建以來隆替遺蹟載諸史乘故不多述今溥常老和尚以寺正誌尚付缺如思有以創之乃聘本城陳寥士居士主其事閱二載誌成請序於余余曰寺有誌書猶國家之有鑑史敍遞代之興亡詳古德之實事觸目警心有所徵勸且其中非唯文章之斐嬗又可與道術相感發者也扶宗翼教豈曰小補之哉是為序民國丙子歲孟夏月觀宗寺式昌謹撰七塔報恩禪寺志序曠觀宇宙間萬事萬物形形色色悉皆唯心本具亦屬唯識所現莫不由於文言之形容傳寫昭垂千古而不磨滅者至矣哉文字般若有不可思議也近時歐西物質發達東方文化演進博學志士攷古精密圖志史學最為重要本寺唐代心鏡奐祖開山以來鄞縣天童兩志歷歷可稽而本寺志乘竟付缺如大抵時代湮遠興替重疊縣志所云咸豐十一年兵燬淨盡古蹟等等何處搜羅溥常住此多年蓄意已久於民國二十四年冬發起禪堂坐香時已輯宗譜付梓復以寺志商確法門諸公幸遇陳寥士居士乃蒙欣然贊許總其大成圓瑛智圓諦聞趙百辛王宇高黃夢度王玄冰胡蒙子諸君共襄斯舉猗歟休哉太上以立德其次以立功其次以立言此三者是仁人君子所樂為贊襄而唱導之竊自思念繼往開來世出世法同本此心惟前人有未了之事而後人有繼起之責後人當以前人之心為心前後人心均得安慰在同志者固知積漸搜考苦心集成誘進後來不知者未免眼中着屑若論法門但願空諸所有慎勿實諸所無如訶斥文字語言諸相落第二義余亦只唯唯而退是為序民國二十六年仲春之月報恩退居溥常宏鉌謹識大雄寶殿觀音菩薩像大雄寶殿觀音菩薩像贊並序鄞縣志云明洪武二十年本昌國梅岑山寶陀寺懸海信國公湯和起遣海島居民遷入江東奏改寺名棲心為補陀嗣後就地人民每逢觀音聖誕熙來攘往擁擠進香至今相續不斷即是華嚴所說南方補怛洛迦也謹稽首對像作贊曰稽首妙智觀世音娑婆世界真教體應機而現為說法信心起處說法竟我今見境得成就亦同音聞獲圓通千手千眼雖不齊要是一真妙精明願今持此妙法門於此剎土為佛事一切聲色𤍠惱中常與眾生作清涼皈依救世大悲者願賜威光加被我令我獲無作妙力令我亦名無所畏令我具無礙辯才令我入一切種智我與一切諸有情皆如觀音得自在民國二十六年春退隱宏鉌溥常敬題五百羅漢石刻之一七塔寺志序佛之為教廣大悉備遍十方界其視大地之一隅若一漚之於大海也其為觀也剎那之間萬劫過焉其視數十百年興廢遞嬗之迹若目之一瞬也然則就一寺一塔而紀其始末以吾屬視之誠偉矣勞矣自佛觀之其無過一漚之微一瞬之頃而已雖然十方界之大一漚之所積也億萬劫之久一瞬之所累也則其廣也其久也又安得薄此一漚一瞬之微哉且佛之滅度久矣其教之所能廣庇眾生以至今日者豈非藉傳衍之力而古剎名山則結集之場說法傳戒之所也其繫佛說推布遞嬗之大如此則其考其廢興成壞之迹以行世亦皈佛者所有事也甬上故道場勝地僧俗薰修梵宇相望而七塔寺創自有唐千百年以還雖名數易而宏法之旨則無少異也獨寺迄無志緇白欲考其事跡乃無所據識者憾焉四明陳君寥士念末劫之方來而宗風之不可不振也綴輯是編以廣宏教之旨書成請序於余余雖學佛而所得於教義者至淺姑推論廣微久暫之義序以歸之民國廿六年六月番禺葉恭綽開山祖塔開山祖塔碑文棲心寺故禪德和尚焚身五色舍利三十粒時咸通年十一月四日進七粒入內廷次年九月唐勅賜號心鏡大師壽相勅奉為至仁大聖廣孝皇帝延慶節建造此塔伏資景福時咸通十四年歲次癸巳六月甲午朔廿八日立右塔僧志中知造舍利殿僧失他唵毗輸耶娑娑囉拏褐底訶蘇跋析羅瑜散陀羅輸瑟毗逝耶怛他揭多阿析囉迦耶拏毗鉢羅底地瑟恥帝末禰末毗普吒勃地薩末薩婆勃析囉揭鞞跋迦耶毗秣提怛他褐多三摩魂婆娑蒲馱耶三澷吒那類地瑟帝右百八十有六字為唐勅賜心鏡禪師真身舍利塔文字中之尚可辨者句文斷蝕不可卒讀原文尚無旁本發見可資校證爰付影寫以存其真何日得窺全豹俟諸來者寥士記原刻字樣大小不等共剝蝕若干字亦不敢臆斷右所謄錄者略存原形而已寥士又記慈運慧祖遺像慈運老和尚像如如不動王震題七塔寺志凡例七塔寺志草創伊始溥常長老敦促至殷不揣剪陋幾加考量爰訂凡例以挈綱目取材非宏挂漏難免後有述者此其蒿矢乙亥初霜陳寥士識了了方位可稽丘索萬象在圖尺楮已足志圖記第一云何壽世唯金與石現茲三寶有像有塔志金石第二唐宋明清寺名屢易薪盡火傳法眷則一志沿革第三梵宮禪宇光大發揚甬東佛地方興未央志建置第四閒雲卓錫法雨傳燈聲聞廣被人仰高僧志僧譜第五莊嚴佛門崇茲戒律井井有條比丘矜式志法要第六資生事業不違實相安此鉢盂千秋供養志產業第七高文疥壁雲璈嗣響偶留雪鴻且證微尚志藝文第八
