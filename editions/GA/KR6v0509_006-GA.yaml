body:
  text: 四明陳寥士纂志法要宋天目禮禪師重裝心鏡禪師像開光法語心鏡僧伽飾舊容分明五彩畫虛空要知空作何形段只在如今一點中且道是那一點以筆作點勢云開眼也著合眼也著清八指頭陀為慈老人起棺法語八十年中海內師趙州古佛德堪追秋風忽動西歸興黃菊無情也淚垂恭維長庚退席七塔中興慈公老和尚誕質湘潭披緇江右徧參煙水久歷風霜卓錫甬東浮杯海上莊嚴萬善總持一心道俗翹誠人天推出宏法太白中興報恩清澄碧海光應彤庭頒請龍藏還山光揚象教四眾歡騰八部交讚此猶是世諦流布未足為老人頌惟其為法為人慈心濟物四來不拒一粒同餐有求皆應無願不從年逾八秩道播十方義龍律虎俱出其門春蘭秋菊各擅其美真所謂喜捨慈悲皆具足福德壽考悉俱圓生榮死哀舉世無匹第當此魔强法弱之時僧寶云亡之際耆舊彫謝誠我法門之不幸也雖然如是祇今起棺歸天童入壙又作麼生更無黃葉隨風舞惟有青松夾道迎卓柱云起又入壙法語這座無縫塔誰能請樣描浮根俱已謝神理豈能超幽坑一以閉千年不復朝惟有無影樹千條復萬條又對靈小參法語如華嚴經所明十地菩薩於六波羅密各有偏多餘非不修但隨力隨分敬安則謂我慈老和尚於萬行門中惟德最勝更難得者一生不矜己長不談人短喜成人以德濟人之困為人忘己損自益他處逆若順遇險而安其肚量寬宏若太虛之廣不拒諸有如大海之深不拒眾流故能建大道場作大佛事福壽全歸唯德所至回憶敬安在跨塘庵閉關時持過午不食戒時過不吃惟老人來庵即為取表定時時至親持鉢飯碗羹送入關房有病為調湯藥慰問備至此猶令人銘心刻骨不能忘者今秋七月至七塔問疾老人含笑謂敬安曰與爾相交四十載今將長別嗚呼不意竟成讖語桑梓情深今已矣雲水年邁更何依又祖堂入牌位法語一切法無生一切法無滅我佛大沙門常作如是說於此會得慈老人八十年前未曾生八十年後不曾滅既不曾生又不曾滅則昨日靈柩入山全身入塔乃成虛設是故當知聖人於無生滅中示現生滅求其生滅之跡了不可得譬如日生於東而沒於西日果東生而西沒乎仲尼川上歎曰逝者於斯未嘗往也肇法師又曰江河競注而不流即不生滅亦成剩語良久云萬古碧潭空界月再三撈漉始知休伏維尚饗民國諦閑老法師上堂法語師拈柱杖云百歲韶華一剎那無邊煩惱盡消磨惟公親證無生忍大用繁興海湧波諸上座須知中興報恩堂上慈運慧祖老和尚原非生而現生住世八十四年繼往開來悲興慈運太白拈搥豎拂甬東法幢高懸令未種者種已種者熟已熟者脫堪稱根深果茂源遠流長本不滅而示滅待機一十六載攝用歸體入定安禪先遊方便有餘次臻實報莊嚴後入常寂光土可云惺寂雙流真常妙樂今逢百齡寂慶諸龍象大德為建法界聖凡水陸普度大齋所集殊勳均資恩有唯冀寂光常照返駕慈航接引迷流同遊覺海茲當降誕良辰乞本上座舉揚箇事眾中也曾委悉者麼良久拈拄杖云老和尚現身了也卓一卓云法界藏身隨處現溪光山色盡遮那擲杖下座圓瑛和尚冬至陞座法語一陰增極一陽回氣候循環任運推變化密移人不覺但看律管動飛灰諸上座陰陽遞改一物不遷歲序如流一真不動即此不動不遷為諸佛之本源乃眾生之慧命萬化靡不資始乎此古德云有物先天地無形本寂寥能為萬象主不逐四時凋若向這裏會得始信江河競注而不流日月經天而不動其或未然但見雲駛月運舟行岸移以輪迴心起輪迴見彼圓覺性即同流轉然既如是即今冬至陞座一句又什麼生說呢卓拄杖云當初只道茅長短斫去原來地不平又除夕陞座法語忙忙又是一年週內外勤勞未暫休祇見事從眼底過不知全在此中收有說每日從朝至暮都是空過與本人分上有何交涉有說平時燒香換水都是禪機本地風光何處不現據山僧檢點起來許他各具一隻眼何以故動也得靜也得動靜雙離恁麼得若向這裏見個親切可謂靈光獨耀法眼雙明既然如是即今除夕一句又什麼生道卓拄杖云今歲今宵盡明年明日來不生分別見新舊絕安排又天童上堂法語太白巍巍冠海山紅塵飛不到禪關天然景物玄機露水自流兮雲自閒諸上座水也雲也與衲僧分上有何交涉聻顧左右云如若宗眼未明法身未見則水是水雲是雲自然打成兩橛如若摸著向上巴鼻了知水即性中之水雲亦心內之雲肇法師云天地與我同根萬物皆吾一體在這裏見得親切始信古人老婆心切將無價寶藏和盤托出今者護法特請上堂舉揚法要且道作麼生指陳卓拄杖云白雲豈在青山外青山常在白雲中又七塔禪堂起七法語民國廿四年十二月十五晚今朝七塔寺重振舊家風不落言思路單提向上宗葛籐都斬斷但覓主人翁忽於無覓處覿面恰相逢卓香板云起溥常和尚陞座法語民國二十二年古曆十一月十七日進院和上拈香祝聖畢斂衣就座舉如意云是日彌陀聖誕節大地善信皆歡悅新舉住持才陞座且將如何對眾說憶前金陵毗盧露醜今住寧波七塔報恩未免又作一場賣弄了古人道法隨法行法幢隨處建立殊屬自笑其不量耳昔日法燈和尚云山僧卑志本欲棲身岩竇隱遁過時緣因先師有不了底公案出來為他了却時有僧問如何是先師未了底公案和尚打云祖禰不了殃及兒孫請問諸上座且道過在甚麼處還有能檢點得出麼溥常老朽自愧既承來賓道賀兩序珍重久立據此座行此令單單只賣死貓頭無知咬著冷汗流將此深心奉塵剎是則名為報佛恩下座又上禪堂起香法語民國廿四年古歷九月廿一日早二板智圓常西兩退居佛舟首座嘉善後堂圓成深悟智禪三堂主并兩序僧俗近二百餘眾分班站立維那呼悅眾師鳴引磬迎請和尚和上進堂站中央舉香板云般若如大火聚觸之便燒又如清涼池四面皆可入七塔禪堂今日宏開般若紅爐煅煉法界聖凡正所謂十方同聚會個個學無為此是選佛場心空及第歸惟願兩序大眾同心努力豎精進幢披忍辱鎧舉起金剛王寶劍一超直往菩提正路行將去又貼單法語十月十四日和上拈單條云前月開始坐香今朝期頭貼單禪堂圍爐打坐十方高人聚會不分人我彼此同是一真法界雖然如是即今貼單成為世諦流布又作麼生法華經云是法住法位世間相常住和上分東西貼畢復位舉如意云恭喜兩序大眾謹遵六和遺訓奮發無畏精神豁開頂門正眼下座又結制法語十月十五日和上拈拄杖云今朝十月十五日七塔寺裏結冬比較往年大不相同禪堂既已起香須與大眾決議不用諸位兄弟參禪不用諸位兄弟會理單單的不欲瞌睡若也瞌睡遠承滹陀嫡旨近遭天童橛頭一頓痛棒打出骨髓莫言不道果然能得如是恭喜兩序大眾一超直入如來地世界爾眾生爾塵塵爾剎剎爾念念爾於恁麼時更無有異法良久云動靜閑忙遮那妙體卓拄杖下座又解七法語十二月廿一日和尚云臘月梅花開經過霜雪來七塔紅爐韝煅凡成聖胎今日選佛場苦行不容易天童一橛頭痛打這個賊刀刀見痕條條見血賊賊看破汝即今解七又作麼說雪山山下擁簑人白牛一掣芒繩斷大家辛苦好洗脚去又臘八陞座法語雪嶺六年弄巧成拙出得身來天空地闊好事大家知今朝臘月八正覺山前明星現時釋迦與大地眾生一時成佛祖師門下蹉口道著佛字漱口三日先行不到末後太過各與二十拄杖旁有不甘者漢出來本覺與人判斷也合與二十拄杖老僧今日與現前上座說二邊不立中道不居正恁麼時作麼生會要了就要了瞿曇討煩惱入山出山自起自倒夜來斗轉玉繩橫不覺全身墮荒草喝下座又元旦陞座法語民國二十五年和上執如意云今朝正月初一日大家都說彌勒生日請唱一曲太平歌摩訶般若波羅密諸佛與眾生本無優與劣祇因迷不覺妄心生分別分別若不生冷煖自知得所以道彌勒真彌勒化身千百億時時示時人時人自不識請問諸上座那個是彌勒若能識得當下安恬如其未然請聽七一老僧說些之乎也者新年新月新日新時恭喜兩序大眾行住坐臥吉祥如意又解制法語正月十五日和尚拈拄杖云今朝新正十五日且喜日輪正當戶晝夜明明無間斷只因時人不解顧若能解顧廓徹乾坤全體露東西南北任縱橫那事應須沒差互叢林下衲僧家值此解制時南天台北五台游歷參訪聽其自由且作麼生沒差互去古人道一寸光陰一寸金寸金難買寸光陰光陰本是非他物青天白日笑吟吟恭喜兩序大眾各自珍重又退居辭眾陞座法語民國二十五年十二月十四日和尚執如意云念盡智明玉壺引步神虛鑑遠寶鏡含輝應萬化而無當不墮諸數湛一真而獨照不外餘塵衲僧不慧偶墮夤緣出應時去就無非水雲姿今日告退歸林壑得便宜了且便宜諸上座且作麼生是得便宜處良久云此後專為自己事年老不為別人憂萬年規約目次萬年規約釋家憲律量事區分博約折中後列諸目成於溥常長老任內並經智圓圓瑛二退居之參酌終於粲然大備條文浩繁不及備載欲窺全豹待刊單本撮其目錄亦可知其梗概也一緒言二鄞縣政府立案布告三立法議案四同住規約五丈室規諫六庫房規約七客堂規約附客堂同事規約八禪堂規約九衣鉢寮規約十淨業堂規約十一如意寮規約十二雲水堂規約十三大廚房規約十四浴堂規鑑十五普同塔規約十六選舉法十七拈鬮法十八進院法十九退院法二十看單法二十一安置退居法并序二十二禪堂打七基金緣起附募化序文助捐鴻名禪堂基金息用細則公議禪堂坐香紀事錄二十三報恩宗譜開會成立紀事錄二十四功行堂寂光堂緣起二十五七塔報恩佛學院簡章附逐日細則嚴禁條例二十六盂蘭盆會發起說明書二十七開山中興及歷代住持班首書記上供供眾細則二十八助齋僧田功行紀事二十九常年舉行佛事歷
